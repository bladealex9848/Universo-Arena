<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Universo 3D — Antigravity Gemini 3.5 High</title>
  <meta name="description" content="Simulación interactiva 3D del Sistema Solar y cuerpos celestes con órbitas Keplerianas elípticas físicas, cometa Halley con cola direccional, y cinturón de asteroides optimizado con Thin Instances. Desarrollado con BabylonJS." />
  <style>
    /* ── Reset General y Tipografía ──────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020208;
      font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
      user-select: none;
    }

    /* ── Canvas Principal de Renderizado ─────────────────────────── */
    #renderCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      outline: none;
    }

    /* ── Panel de Configuración de la Experiencia (UI) ───────────── */
    #panel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 320px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 160, 255, 0.3);
      border-radius: 16px;
      padding: 20px;
      font-size: 13px;
      line-height: 1.6;
      z-index: 100;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    }
    #panel.collapsed {
      transform: translateX(calc(100% + 24px));
      opacity: 0;
      pointer-events: none;
    }

    #panel h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #78a0ff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(120, 160, 255, 0.2);
      padding-bottom: 8px;
    }
    #panel h2::before {
      content: '🌌';
      font-size: 18px;
    }

    /* Secciones del Panel */
    .section {
      margin-bottom: 18px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(120, 160, 255, 0.7);
      margin-bottom: 12px;
      border-left: 2px solid #5b96f7;
      padding-left: 8px;
    }

    /* Filas de Controles */
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }
    .control-row label {
      flex: 1;
      color: rgba(226, 232, 240, 0.85);
      font-size: 12px;
    }
    .control-row input[type="range"] {
      flex: 1.5;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(120, 160, 255, 0.2);
      outline: none;
      cursor: pointer;
    }
    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #78a0ff;
      box-shadow: 0 0 8px rgba(120, 160, 255, 0.6);
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .control-row input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.25);
    }
    .val-label {
      font-size: 11px;
      font-family: monospace;
      color: rgba(120, 160, 255, 0.9);
      min-width: 34px;
      text-align: right;
    }

    /* Checkboxes */
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }
    .check-row:hover {
      background: rgba(120, 160, 255, 0.08);
    }
    .check-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #5b96f7;
      cursor: pointer;
    }
    .check-row span {
      font-size: 12.5px;
      color: rgba(226, 232, 240, 0.9);
    }

    /* Selectores (Dropdowns) */
    .select-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .select-row label {
      flex: 1;
      font-size: 12px;
      color: rgba(226, 232, 240, 0.85);
    }
    .select-row select {
      flex: 1.5;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(120, 160, 255, 0.35);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }
    .select-row select:hover {
      border-color: rgba(120, 160, 255, 0.6);
    }

    /* Botones de Control */
    button.btn-primary {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(120, 160, 255, 0.4);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.5), rgba(37, 99, 235, 0.4));
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button.btn-primary:hover {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.75), rgba(37, 99, 235, 0.6));
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.4);
    }
    button.btn-primary:active {
      transform: scale(0.98);
    }

    /* Scrollbar del Panel */
    #panel::-webkit-scrollbar {
      width: 5px;
    }
    #panel::-webkit-scrollbar-track {
      background: transparent;
    }
    #panel::-webkit-scrollbar-thumb {
      background: rgba(120, 160, 255, 0.3);
      border-radius: 3px;
    }

    /* ── Botón Toggle para el Panel (Especialmente Móvil) ───────── */
    #togglePanel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(120, 160, 255, 0.35);
      border-radius: 12px;
      color: #78a0ff;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 101;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      transition: background-color 0.2s, transform 0.2s;
    }
    #togglePanel:hover {
      background: rgba(20, 35, 70, 0.95);
      transform: scale(1.05);
    }

    /* ── Panel de Estadísticas (Inferior Izquierdo) ──────────────── */
    #statsPanel {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(10, 15, 30, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(120, 160, 255, 0.25);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.6;
      z-index: 100;
      color: rgba(226, 232, 240, 0.8);
      pointer-events: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    #statsPanel .fps-label {
      font-size: 16px;
      font-weight: 700;
      color: #4ade80;
      display: inline-block;
      margin-right: 4px;
    }
    #statsPanel .stat-row {
      margin-bottom: 2px;
    }
    #statsPanel .help-text {
      border-top: 1px solid rgba(120, 160, 255, 0.15);
      margin-top: 6px;
      padding-top: 4px;
      color: rgba(148, 163, 184, 0.8);
    }

    /* ── Pantalla de Carga (Overlay de Inicialización) ───────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #0a0f24 0%, #020206 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loader h1 {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #78a0ff;
      margin-bottom: 24px;
      text-shadow: 0 0 20px rgba(120, 160, 255, 0.4);
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(120, 160, 255, 0.1);
      border-top-color: #5b96f7;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #loader p {
      color: rgba(148, 163, 184, 0.8);
      font-size: 13px;
      margin-top: 20px;
      letter-spacing: 0.05em;
    }

    /* ── Adaptabilidad Móvil (Responsive) ────────────────────────── */
    @media (max-width: 600px) {
      #panel {
        width: calc(100vw - 32px);
        right: 16px;
        top: 72px;
      }
      #panel.collapsed {
        transform: translateY(calc(-100% - 80px));
        opacity: 0;
      }
      #togglePanel {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <!-- Overlay de Carga Inicial -->
  <div id="loader">
    <h1>Simulador 3D</h1>
    <div class="spinner"></div>
    <p>Construyendo el cosmos interactivo...</p>
  </div>

  <!-- Botón de Menú para Pantallas Pequeñas -->
  <button id="togglePanel" aria-label="Mostrar u Ocultar panel lateral">☰</button>

  <!-- Canvas Principal de Renderizado 3D -->
  <canvas id="renderCanvas" tabindex="0"></canvas>

  <!-- Panel Lateral de Configuración -->
  <div id="panel" role="complementary" aria-label="Panel de configuración">
    <h2>Sistema Solar</h2>

    <!-- SECCIÓN 1: Tiempo y Velocidad -->
    <div class="section">
      <div class="section-title">⏱ Tiempo y Velocidad</div>
      <div class="control-row">
        <label for="sldGlobalSpeed">Velocidad Global</label>
        <input type="range" id="sldGlobalSpeed" min="0" max="10" step="0.1" value="1.0" />
        <span class="val-label" id="lblGlobalSpeed">1.0x</span>
      </div>
      <div class="control-row">
        <label for="sldOrbitalMult">Velocidad Orbital</label>
        <input type="range" id="sldOrbitalMult" min="0.1" max="3" step="0.05" value="1.0" />
        <span class="val-label" id="lblOrbitalMult">1.0x</span>
      </div>
      <button class="btn-primary" id="btnPause">⏸ Pausar Simulación</button>
    </div>

    <!-- SECCIÓN 2: Visualización -->
    <div class="section">
      <div class="section-title">👁 Visualización</div>
      <label class="check-row" for="chkOrbits">
        <input type="checkbox" id="chkOrbits" checked />
        <span>Mostrar Órbitas</span>
      </label>
      <label class="check-row" for="chkLabels">
        <input type="checkbox" id="chkLabels" checked />
        <span>Mostrar Nombres</span>
      </label>
      <label class="check-row" for="chkHalley">
        <input type="checkbox" id="chkHalley" checked />
        <span>Cometa Halley</span>
      </label>
      <label class="check-row" for="chkTail">
        <input type="checkbox" id="chkTail" checked />
        <span>Cola del Cometa</span>
      </label>
      <label class="check-row" for="chkAsteroids">
        <input type="checkbox" id="chkAsteroids" checked />
        <span>Cinturón de Asteroides</span>
      </label>
      <label class="check-row" for="chkNebulas">
        <input type="checkbox" id="chkNebulas" checked />
        <span>Nebulosas de Fondo</span>
      </label>

      <div class="select-row">
        <label for="selCamera">Foco de Cámara</label>
        <select id="selCamera">
          <option value="solar">Sistema Solar</option>
          <option value="sun">Sol Cercano</option>
          <option value="earth">Tierra</option>
          <option value="saturn">Saturno</option>
          <option value="panorama">Panorámica</option>
          <option value="halley">Seguir Cometa</option>
        </select>
      </div>

      <div class="control-row">
        <label for="sldPlanetScale">Escala Planetas</label>
        <input type="range" id="sldPlanetScale" min="0.5" max="3" step="0.05" value="1.0" />
        <span class="val-label" id="lblPlanetScale">1.0x</span>
      </div>
    </div>

    <!-- SECCIÓN 3: Estética -->
    <div class="section">
      <div class="section-title">🎨 Estética y Render</div>
      <div class="select-row">
        <label for="selTheme">Tema de Escena</label>
        <select id="selTheme">
          <option value="futuristic">Futurista (Neón)</option>
          <option value="classic">Clásico (Cálido)</option>
          <option value="dark">Espacio Oscuro</option>
        </select>
      </div>
      <label class="check-row" for="chkBloom">
        <input type="checkbox" id="chkBloom" checked />
        <span>Bloom / Glow de Escena</span>
      </label>
      <div class="select-row">
        <label for="selSunColor">Color del Sol</label>
        <select id="selSunColor">
          <option value="white">Blanco Estelar</option>
          <option value="yellow" selected>Amarillo Solar</option>
          <option value="orange">Naranja Vivo</option>
          <option value="red">Gigante Roja</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Panel de Información e Instrucciones (Esquina Inferior Izquierda) -->
  <div id="statsPanel">
    <div class="stat-row">
      FPS: <span class="fps-label" id="fpsDisplay">--</span>
    </div>
    <div class="stat-row" id="objCount">
      Objetos en escena: calculando...
    </div>
    <div class="help-text">
      🖱 Clic Izq + Arrastrar: Rotar Cámara<br>
      🖱 Clic Der + Arrastrar: Desplazar Escena (Pan)<br>
      🌀 Rueda: Zoom Suave
    </div>
  </div>

  <!-- BabylonJS CDN Scripts -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

  <!-- Lógica de Simulación 3D -->
  <script>
    "use strict";

    // ═══════════════════════════════════════════════════════════════════
    // 1. CONSTANTES, DATOS Y CONFIGURACIÓN DEL SISTEMA SOLAR
    // ═══════════════════════════════════════════════════════════════════

    /**
     * Paleta de colores predefinida para los colores del Sol y sus luces
     */
    const SUN_COLORS = {
      white:  { core: [1.0, 1.0, 1.0], point: [0.95, 0.95, 1.0] },
      yellow: { core: [1.0, 0.7, 0.15], point: [1.0, 0.92, 0.8] },
      orange: { core: [1.0, 0.4, 0.05], point: [1.0, 0.65, 0.4] },
      red:    { core: [0.95, 0.1, 0.05], point: [1.0, 0.3, 0.2] }
    };

    /**
     * Datos del Sistema Solar.
     * distance: Semieje mayor orbital (a)
     * size: Radio relativo de la esfera del planeta
     * color: Color base RGB para renderizado
     * speed: Factor de velocidad angular para órbita (proporcional Kepler)
     * tilt: Inclinación axial propia (rotación del eje en radianes)
     * eccentricity: Excentricidad de la elipse (0 = circular, ~0.2 = elíptica)
     * orbitTilt: Inclinación orbital respecto al plano ecuatorial del Sol (XZ)
     */
    const PLANETS_DATA = [
      {
        name: 'Mercurio', distance: 28, size: 0.8,
        color: [0.65, 0.60, 0.55], speed: 1.59, tilt: 0.0006,
        eccentricity: 0.205, orbitTilt: 0.122, atmosphere: false
      },
      {
        name: 'Venus', distance: 42, size: 1.4,
        color: [0.92, 0.78, 0.40], speed: 1.18, tilt: 3.096, // Eje inclinado casi 180° (retrógrado)
        eccentricity: 0.006, orbitTilt: 0.059, atmosphere: true,
        atmColor: [0.95, 0.85, 0.5]
      },
      {
        name: 'Tierra', distance: 60, size: 1.5,
        color: [0.15, 0.45, 0.85], speed: 1.00, tilt: 0.409,
        eccentricity: 0.016, orbitTilt: 0.0, atmosphere: true,
        atmColor: [0.35, 0.65, 1.0], isEarth: true
      },
      {
        name: 'Marte', distance: 82, size: 1.0,
        color: [0.82, 0.32, 0.12], speed: 0.80, tilt: 0.439,
        eccentricity: 0.093, orbitTilt: 0.032, atmosphere: true,
        atmColor: [0.9, 0.55, 0.3]
      },
      {
        name: 'Júpiter', distance: 135, size: 5.5,
        color: [0.80, 0.65, 0.45], speed: 0.43, tilt: 0.054,
        eccentricity: 0.048, orbitTilt: 0.022, atmosphere: false
      },
      {
        name: 'Saturno', distance: 185, size: 4.5,
        color: [0.82, 0.72, 0.52], speed: 0.32, tilt: 0.473,
        eccentricity: 0.054, orbitTilt: 0.043, atmosphere: false,
        hasRings: true, ringColor: [0.72, 0.63, 0.5], isSaturn: true
      },
      {
        name: 'Urano', distance: 235, size: 3.0,
        color: [0.55, 0.85, 0.90], speed: 0.22, tilt: 1.706, // Inclinado 97.77°
        eccentricity: 0.047, orbitTilt: 0.013, atmosphere: true,
        atmColor: [0.45, 0.88, 0.95]
      },
      {
        name: 'Neptuno', distance: 280, size: 2.8,
        color: [0.18, 0.30, 0.90], speed: 0.18, tilt: 0.494,
        eccentricity: 0.009, orbitTilt: 0.031, atmosphere: true,
        atmColor: [0.25, 0.45, 0.95]
      },
      {
        name: 'Plutón', distance: 340, size: 0.55,
        color: [0.52, 0.45, 0.38], speed: 0.15, tilt: 2.138,
        eccentricity: 0.248, orbitTilt: 0.298, atmosphere: false // Órbita altamente excéntrica e inclinada
      }
    ];

    // Variables de Estado de la Aplicación
    const STATE = {
      globalSpeed: 1.0,
      orbitalSpeedMultiplier: 1.0,
      isPaused: false,
      showOrbits: true,
      showLabels: true,
      showHalley: true,
      showTail: true,
      showAsteroids: true,
      showNebulas: true,
      cameraTarget: 'solar',
      planetScale: 1.0,
      activeTheme: 'futuristic',
      bloomEnabled: true,
      sunColorKey: 'yellow',
      followHalley: false
    };

    // Referencias a Objetos 3D Críticos
    const REFS = {
      canvas: null,
      engine: null,
      scene: null,
      camera: null,
      hemiLight: null,
      sunLight: null,
      sunMesh: null,
      sunCoronaSet: null,
      planets: [], // Lista con objetos de estructura planetaria
      orbits: [],  // Lista de órbitas dibujadas
      asteroidBelt: null, // Malla base del cinturón
      halleyMesh: null,
      halleyParticles: null,
      nebulas: [],
      renderingPipeline: null,
      glowLayer: null
    };


    // ═══════════════════════════════════════════════════════════════════
    // 2. INICIALIZACIÓN DE MOTOR Y ESCENA
    // ═══════════════════════════════════════════════════════════════════

    window.addEventListener('DOMContentLoaded', () => {
      REFS.canvas = document.getElementById('renderCanvas');
      
      // Inicializar el Engine de BabylonJS
      REFS.engine = new BABYLON.Engine(REFS.canvas, true, {
        preserveDrawingBuffer: true,
        stencil: true,
        antialias: true
      });

      // Crear la escena básica
      REFS.scene = new BABYLON.Scene(REFS.engine);
      REFS.scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.03, 1.0);

      // Crear Cámara Orbital
      REFS.camera = new BABYLON.ArcRotateCamera(
        "orbitCamera",
        -Math.PI / 2,
        Math.PI / 3.5,
        180,
        BABYLON.Vector3.Zero(),
        REFS.scene
      );
      REFS.camera.attachControl(REFS.canvas, true);
      REFS.camera.lowerRadiusLimit = 15;
      REFS.camera.upperRadiusLimit = 2000;
      REFS.camera.wheelPrecision = 20; // Sensibilidad de la rueda

      // Comportamiento de auto-rotación por defecto
      REFS.camera.useAutoRotationBehavior = true;
      if (REFS.camera.autoRotationBehavior) {
        REFS.camera.autoRotationBehavior.idleRotationSpeed = 0.03;
        REFS.camera.autoRotationBehavior.idleRotationWaitTime = 6000;
        REFS.camera.autoRotationBehavior.idleRotationSpinupTime = 2000;
        REFS.camera.autoRotationBehavior.zoomStopsAnimation = false;
      }

      // Inicializar Iluminación
      REFS.hemiLight = new BABYLON.HemisphericLight("ambientLight", new BABYLON.Vector3(0, 1, 0), REFS.scene);
      REFS.hemiLight.intensity = 0.15;
      REFS.hemiLight.diffuse = new BABYLON.Color3(0.8, 0.9, 1.0);
      REFS.hemiLight.specular = new BABYLON.Color3(0, 0, 0);

      REFS.sunLight = new BABYLON.PointLight("sunLight", BABYLON.Vector3.Zero(), REFS.scene);
      REFS.sunLight.intensity = 2.2;
      const initialSunColor = SUN_COLORS[STATE.sunColorKey].point;
      REFS.sunLight.diffuse = new BABYLON.Color3(...initialSunColor);
      REFS.sunLight.specular = new BABYLON.Color3(0.5, 0.5, 0.5);

      // Construcción del Cosmos
      buildUniverse();

      // Configuración de UI
      setupUI();

      // Desvanecer overlay de carga
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 1200);

      // Bucle de Renderizado Principal
      REFS.scene.onBeforeRenderObservable.add(() => {
        updateSimulation();
      });

      REFS.engine.runRenderLoop(() => {
        REFS.scene.render();
        document.getElementById('fpsDisplay').innerText = Math.round(REFS.engine.getFps());
      });

      window.addEventListener('resize', () => {
        REFS.engine.resize();
      });
    });


    // ═══════════════════════════════════════════════════════════════════
    // 3. FUNCIONES HELPER PARA TEXTURAS PROCEDURALES
    // ═══════════════════════════════════════════════════════════════════

    function makeLabelTexture(text) {
      const textureSize = 256;
      const dt = new BABYLON.DynamicTexture("lblTex_" + text, textureSize, REFS.scene, true);
      const ctx = dt.getContext();

      ctx.clearRect(0, 0, textureSize, textureSize);
      
      ctx.fillStyle = "rgba(10, 15, 35, 0.6)";
      ctx.beginPath();
      ctx.roundRect(16, 96, textureSize - 32, 64, 12);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(100, 160, 255, 0.4)";
      ctx.stroke();

      ctx.font = "bold 26px 'Outfit', 'Segoe UI', sans-serif";
      ctx.fillStyle = "rgba(226, 232, 240, 0.95)";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, textureSize / 2, 128);

      dt.update();
      return dt;
    }

    function makeFlareTexture(baseColor) {
      const size = 64;
      const dt = new BABYLON.DynamicTexture("flareTex", size, REFS.scene, false);
      const ctx = dt.getContext();

      ctx.clearRect(0, 0, size, size);
      
      const center = size / 2;
      const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
      
      const r = Math.floor(baseColor.r * 255);
      const g = Math.floor(baseColor.g * 255);
      const b = Math.floor(baseColor.b * 255);
      
      grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1.0)`);
      grad.addColorStop(0.2, `rgba(${r}, ${g}, ${b}, 0.75)`);
      grad.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, 0.25)`);
      grad.addColorStop(1, 'rgba(0, 0, 0, 0.0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      dt.update();
      return dt;
    }

    function makeNebulaTexture(color1, color2) {
      const size = 512;
      const dt = new BABYLON.DynamicTexture("nebulaTex", size, REFS.scene, false);
      const ctx = dt.getContext();

      ctx.clearRect(0, 0, size, size);
      
      const center = size / 2;
      const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
      grad.addColorStop(0, color1);
      grad.addColorStop(0.35, color2);
      grad.addColorStop(1, 'rgba(0, 0, 0, 0.0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      dt.update();
      return dt;
    }

    function createSaturnRingsTexture() {
      const size = 512;
      const dt = new BABYLON.DynamicTexture("saturnRingsTex", size, REFS.scene, false);
      const ctx = dt.getContext();

      ctx.clearRect(0, 0, size, size);
      const center = size / 2;

      for (let r = 80; r < center; r++) {
        let alpha = 0.85;
        if (r > 165 && r < 178) alpha = 0.03;
        if (r > 220 && r < 224) alpha = 0.08;
        if (r > 110 && r < 125) alpha = 0.4;
        if (r > 190 && r < 205) alpha = 0.65;

        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(center, center, r, 0, 2 * Math.PI);
        ctx.stroke();
      }

      dt.update();
      return dt;
    }

    function buildUniverse() {
      createStars();

    function createStars() {
      const starColors = [
        new BABYLON.Color4(1.0, 1.0, 1.0, 0.9),
        new BABYLON.Color4(0.75, 0.88, 1.0, 0.9),
        new BABYLON.Color4(1.0, 0.95, 0.78, 0.8)
      ];

      starColors.forEach((color, idx) => {
        const count = 1000;
        const starSys = new BABYLON.ParticleSystem("stars_" + idx, count, REFS.scene);
        
        starSys.particleTexture = makeFlareTexture(new BABYLON.Color3(1, 1, 1));
        starSys.emitter = BABYLON.Vector3.Zero();
        
        starSys.minEmitBox = new BABYLON.Vector3(-1000, -1000, -1000);
        starSys.maxEmitBox = new BABYLON.Vector3(1000, 1000, 1000);
        
        starSys.color1 = color;
        starSys.color2 = color;
        starSys.colorDead = new BABYLON.Color4(0, 0, 0, 0);

        starSys.minEmitPower = 0;
        starSys.maxEmitPower = 0;
        
        starSys.minSize = 0.3;
        starSys.maxSize = 1.5;

        starSys.minLifeTime = 999999;
        starSys.maxLifeTime = 999999;
        
        starSys.emitRate = count;
        starSys.start();
      });
    }

    function createSun() {
      REFS.sunMesh = BABYLON.MeshBuilder.CreateSphere("sun", { diameter: 12 }, REFS.scene);
      
      const sunMat = new BABYLON.StandardMaterial("sunMat", REFS.scene);
      const initialColors = SUN_COLORS[STATE.sunColorKey].core;
      sunMat.emissiveColor = new BABYLON.Color3(...initialColors);
      sunMat.diffuseColor = new BABYLON.Color3(...initialColors);
      sunMat.specularColor = new BABYLON.Color3(0, 0, 0);
      REFS.sunMesh.material = sunMat;

      try {
        BABYLON.ParticleHelper.CreateAsync("sun", REFS.scene).then((set) => {
          set.systems.forEach(sys => {
            sys.emitter = REFS.sunMesh;
          });
          set.start();
          REFS.sunCoronaSet = set;
        }).catch((err) => {
          console.warn("Fallo en ParticleHelper. Cargar corona manual de respaldo.", err);
          createFallbackSunCorona();
        });
      } catch (e) {
        console.warn("Error del ParticleHelper. Cargar corona manual de respaldo.", e);
        createFallbackSunCorona();
      }
    }

    function createFallbackSunCorona() {
      const coronaSys = new BABYLON.ParticleSystem("sunCoronaFallback", 250, REFS.scene);
      
      coronaSys.particleTexture = makeFlareTexture(new BABYLON.Color3(1, 0.6, 0.1));
      coronaSys.emitter = REFS.sunMesh;
      
      coronaSys.minEmitBox = new BABYLON.Vector3(-1, -1, -1);
      coronaSys.maxEmitBox = new BABYLON.Vector3(1, 1, 1);
      
      coronaSys.color1 = new BABYLON.Color4(1.0, 0.8, 0.2, 0.9);

      coronaSys.maxSize = 4.2;

    function createPlanetsAndOrbits() {
      PLANETS_DATA.forEach(data => {
        const planet = BABYLON.MeshBuilder.CreateSphere("planet_" + data.name, {
          diameter: data.size * 2
        }, REFS.scene);

        const mat = new BABYLON.StandardMaterial("mat_" + data.name, REFS.scene);
        mat.diffuseColor = new BABYLON.Color3(...data.color);
        mat.emissiveColor = new BABYLON.Color3(...data.color.map(c => c * 0.06));
        mat.specularColor = new BABYLON.Color3(0.08, 0.08, 0.08);
        mat.specularPower = 8;
        planet.material = mat;

        planet.rotationQuaternion = BABYLON.Quaternion.RotationYawPitchRoll(0, 0, data.tilt);

        if (data.atmosphere) {
          const atm = BABYLON.MeshBuilder.CreateSphere("atm_" + data.name, {
            diameter: data.size * 2 * 1.15
          }, REFS.scene);
          
          const atmMat = new BABYLON.StandardMaterial("atmMat_" + data.name, REFS.scene);
          atmMat.diffuseColor = new BABYLON.Color3(...data.atmColor);
          atmMat.emissiveColor = new BABYLON.Color3(...data.atmColor);
          atmMat.specularColor = new BABYLON.Color3(0, 0, 0);
          atmMat.alpha = 0.16;
          atmMat.backFaceCulling = false;
          
          atm.material = atmMat;
          atm.parent = planet;
        }

        if (data.hasRings) {
          const ringMesh = BABYLON.MeshBuilder.CreateDisc("rings_" + data.name, {
            radius: data.size * 2.3,
            tessellation: 64
          }, REFS.scene);
          
          const ringMat = new BABYLON.StandardMaterial("ringMat_" + data.name, REFS.scene);
          ringMat.diffuseColor = new BABYLON.Color3(...data.ringColor);
          ringMat.emissiveColor = new BABYLON.Color3(...data.ringColor.map(c => c * 0.12));
          ringMat.specularColor = new BABYLON.Color3(0, 0, 0);
          
          const opacityTex = createSaturnRingsTexture();
          ringMat.opacityTexture = opacityTex;
          ringMat.opacityTexture.hasAlpha = true;
          ringMat.backFaceCulling = false;
          
          ringMesh.material = ringMat;
          ringMesh.parent = planet;
          ringMesh.rotation = new BABYLON.Vector3(Math.PI / 2, 0, 0);
        }

        const labelPlane = BABYLON.MeshBuilder.CreatePlane("lbl_" + data.name, {
          width: 8,
          height: 8
        }, REFS.scene);
        
        const labelMat = new BABYLON.StandardMaterial("lblMat_" + data.name, REFS.scene);
        labelMat.diffuseTexture = makeLabelTexture(data.name);
        labelMat.diffuseTexture.hasAlpha = true;
        labelMat.useAlphaFromDiffuseTexture = true;
        labelMat.specularColor = new BABYLON.Color3(0, 0, 0);
        labelMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
        labelMat.backFaceCulling = false;
        
        labelPlane.material = labelMat;
        labelPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        labelPlane.parent = planet;
        labelPlane.position.y = data.size * 2 + 2;

        const orbitPoints = [];
        const segments = 120;
        const semiMajor = data.distance;
        const ecc = data.eccentricity;
        const semiMinor = semiMajor * Math.sqrt(1 - ecc * ecc);

        for (let i = 0; i <= segments; i++) {
          const theta = (i / segments) * 2 * Math.PI;
          const xOrb = semiMajor * Math.cos(theta) - (semiMajor * ecc);
          const zOrb = semiMinor * Math.sin(theta);

          const x = xOrb;
          const y = zOrb * Math.sin(data.orbitTilt);
          const z = zOrb * Math.cos(data.orbitTilt);

          orbitPoints.push(new BABYLON.Vector3(x, y, z));
        }

        const orbitLine = BABYLON.MeshBuilder.CreateLines("orbitLine_" + data.name, {
          points: orbitPoints
        }, REFS.scene);
        orbitLine.color = new BABYLON.Color3(0.22, 0.35, 0.6);
        orbitLine.alpha = 0.35;
        REFS.orbits.push(orbitLine);

        REFS.planets.push({
          mesh: planet,
          label: labelPlane,
          data: data,
          orbitAngle: Math.random() * Math.PI * 2
        });
      });
    }

    function createAsteroidBelt() {
      REFS.asteroidBelt = BABYLON.MeshBuilder.CreateSphere("asteroidBase", {
        diameter: 0.5,
        segments: 3
      }, REFS.scene);

      const astMat = new BABYLON.StandardMaterial("asteroidMat", REFS.scene);
      astMat.diffuseColor = new BABYLON.Color3(0.4, 0.35, 0.3);
      astMat.emissiveColor = new BABYLON.Color3(0.02, 0.02, 0.02);
      astMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
      REFS.asteroidBelt.material = astMat;

      const numAsteroids = 220;
      const matricesData = new Float32Array(16 * numAsteroids);
      const colorsData = new Float32Array(4 * numAsteroids);

      const innerRadius = 100;
      const outerRadius = 118;

      for (let i = 0; i < numAsteroids; i++) {
        const radius = innerRadius + Math.random() * (outerRadius - innerRadius);
        const theta = Math.random() * Math.PI * 2;
        const tilt = (Math.random() - 0.5) * 0.07;

        const x = radius * Math.cos(theta);
        const y = radius * Math.sin(theta) * Math.sin(tilt);
        const z = radius * Math.sin(theta) * Math.cos(tilt);

        const scale = 0.55 + Math.random() * 0.7;
        const rx = Math.random() * Math.PI;
        const ry = Math.random() * Math.PI;
        const rz = Math.random() * Math.PI;

        const matrix = BABYLON.Matrix.Compose(
          new BABYLON.Vector3(scale, scale, scale),
          BABYLON.Quaternion.RotationYawPitchRoll(ry, rx, rz),
          new BABYLON.Vector3(x, y, z)
        );

        matrix.copyToArray(matricesData, i * 16);

        const colorVal = 0.25 + Math.random() * 0.25;
        colorsData[i * 4] = colorVal;
        colorsData[i * 4 + 1] = colorVal * 0.9;
        colorsData[i * 4 + 2] = colorVal * 0.8;
        colorsData[i * 4 + 3] = 1.0;
      }

      REFS.asteroidBelt.thinInstanceSetBuffer("matrix", matricesData, 16, false);
      REFS.asteroidBelt.thinInstanceSetBuffer("color", colorsData, 4, false);
    }

    function createHalley() {
      REFS.halleyMesh = BABYLON.MeshBuilder.CreateSphere("halley", { diameter: 0.75 }, REFS.scene);
      
      const halleyMat = new BABYLON.StandardMaterial("halleyMat", REFS.scene);
      halleyMat.emissiveColor = new BABYLON.Color3(0.9, 0.95, 1.0);
      halleyMat.diffuseColor = new BABYLON.Color3(0.8, 0.9, 1.0);
      halleyMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
      REFS.halleyMesh.material = halleyMat;

      REFS.halleyMesh.orbitAngle = 0;

      const semiMajor = 150;
      const ecc = 0.85;
      const semiMinor = semiMajor * Math.sqrt(1 - ecc * ecc);
      const orbitTilt = 0.35;

      const orbitPoints = [];
      const segments = 120;
      for (let i = 0; i <= segments; i++) {
        const theta = (i / segments) * 2 * Math.PI;
        const xOrb = semiMajor * Math.cos(theta) - (semiMajor * ecc);
        const zOrb = semiMinor * Math.sin(theta);

        const x = xOrb;
        const y = zOrb * Math.sin(orbitTilt);
        const z = zOrb * Math.cos(orbitTilt);

        orbitPoints.push(new BABYLON.Vector3(x, y, z));
      }

      const halleyOrbitLine = BABYLON.MeshBuilder.CreateLines("orbitLine_Halley", {
        points: orbitPoints
      }, REFS.scene);
      halleyOrbitLine.color = new BABYLON.Color3(0.4, 0.6, 0.8);
      halleyOrbitLine.alpha = 0.3;
      REFS.orbits.push(halleyOrbitLine);

      REFS.halleyParticles = new BABYLON.ParticleSystem("halleyTail", 1200, REFS.scene);
      
      REFS.halleyParticles.particleTexture = makeFlareTexture(new BABYLON.Color3(0.85, 0.95, 1.0));
      REFS.halleyParticles.emitter = REFS.halleyMesh;
      
      REFS.halleyParticles.minEmitBox = new BABYLON.Vector3(-0.2, -0.2, -0.2);
      REFS.halleyParticles.maxEmitBox = new BABYLON.Vector3(0.2, 0.2, 0.2);

      REFS.halleyParticles.color1 = new BABYLON.Color4(1.0, 1.0, 1.0, 1.0);
      REFS.halleyParticles.color2 = new BABYLON.Color4(0.3, 0.65, 0.9, 0.6);
      REFS.halleyParticles.colorDead = new BABYLON.Color4(0.1, 0.2, 0.5, 0.0);

      REFS.halleyParticles.minSize = 0.3;
      REFS.halleyParticles.maxSize = 1.3;
      
      REFS.halleyParticles.minLifeTime = 0.5;
      REFS.halleyParticles.maxLifeTime = 1.6;
      
      REFS.halleyParticles.emitRate = 800;
      REFS.halleyParticles.blendMode = BABYLON.ParticleSystem.BLENDMODE_ONEONE;
      
      REFS.halleyParticles.minEmitPower = 5.0;
      REFS.halleyParticles.maxEmitPower = 9.0;
      REFS.halleyParticles.gravity = new BABYLON.Vector3(0, 0, 0);

      REFS.halleyParticles.start();
    }

    function createNebulas() {
      const nebulaColors = [
        { c1: "rgba(100, 30, 180, 0.16)", c2: "rgba(20, 60, 160, 0.02)" },
        { c1: "rgba(180, 30, 90, 0.14)",  c2: "rgba(90, 20, 120, 0.01)" },
        { c1: "rgba(20, 160, 160, 0.15)", c2: "rgba(15, 60, 120, 0.02)" },
        { c1: "rgba(180, 80, 20, 0.12)",  c2: "rgba(100, 40, 10, 0.01)" }
      ];

      nebulaColors.forEach((colorSet, idx) => {
        const nebulaPlane = BABYLON.MeshBuilder.CreatePlane("nebula_" + idx, {
          width: 650,
          height: 650
        }, REFS.scene);

        const nebMat = new BABYLON.StandardMaterial("nebMat_" + idx, REFS.scene);
        nebMat.diffuseTexture = makeNebulaTexture(colorSet.c1, colorSet.c2);
        nebMat.diffuseTexture.hasAlpha = true;
        nebMat.useAlphaFromDiffuseTexture = true;
        nebMat.specularColor = new BABYLON.Color3(0, 0, 0);
        nebMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
        nebMat.backFaceCulling = false;
        nebMat.disableLighting = true;

        nebulaPlane.material = nebMat;
        nebulaPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;

        const angle = (idx / nebulaColors.length) * 2 * Math.PI + (Math.random() * 0.4);
        const radius = 1550;
        
        nebulaPlane.position = new BABYLON.Vector3(
          radius * Math.cos(angle),
          (Math.random() - 0.5) * 500,
          radius * Math.sin(angle)
        );

        REFS.nebulas.push(nebulaPlane);
      });
    }

    function setupPostProcessing() {
      try {
        REFS.glowLayer = new BABYLON.GlowLayer("glow", REFS.scene);
        REFS.glowLayer.intensity = 1.35;

        REFS.renderingPipeline = new BABYLON.DefaultRenderingPipeline(
          "defaultPipeline",
          true,
          REFS.scene,
          [REFS.camera]
        );

        REFS.renderingPipeline.bloomEnabled = true;
        REFS.renderingPipeline.bloomThreshold = 0.45;
        REFS.renderingPipeline.bloomWeight = 0.55;
        REFS.renderingPipeline.bloomKernel = 64;

        REFS.renderingPipeline.imageProcessingEnabled = true;
        REFS.renderingPipeline.imageProcessing.toneMappingEnabled = true;
        REFS.renderingPipeline.imageProcessing.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
      } catch (e) {
        console.warn("Error inicializando post-procesamiento. Se desactiva el post-pro.", e);
      }
    }


    // ═══════════════════════════════════════════════════════════════════
    // 5. BUCLE DE ACTUALIZACIÓN Y FÍSICA (deltaTime)
    // ═══════════════════════════════════════════════════════════════════

    function updateSimulation() {
      const dt = REFS.engine.getDeltaTime() / 1000;
      const speedFactor = STATE.isPaused ? 0 : STATE.globalSpeed;

      if (REFS.sunMesh) {
        REFS.sunMesh.rotation.y += dt * 0.08 * speedFactor;
        
        const time = performance.now() / 1000;
        const scaleVal = 1.0 + Math.sin(time * (2 * Math.PI / 3.0)) * 0.03;
        REFS.sunMesh.scaling = new BABYLON.Vector3(scaleVal, scaleVal, scaleVal);
      }

      REFS.planets.forEach(p => {
        const orbitalSpeed = p.data.speed * STATE.orbitalSpeedMultiplier * speedFactor * 0.15;
        p.orbitAngle += dt * orbitalSpeed;

        const semiMajor = p.data.distance;
        const ecc = p.data.eccentricity;
        const semiMinor = semiMajor * Math.sqrt(1 - ecc * ecc);

        const xOrb = semiMajor * Math.cos(p.orbitAngle) - (semiMajor * ecc);
        const zOrb = semiMinor * Math.sin(p.orbitAngle);

        p.mesh.position.x = xOrb;
        p.mesh.position.y = zOrb * Math.sin(p.data.orbitTilt);
        p.mesh.position.z = zOrb * Math.cos(p.data.orbitTilt);

        p.mesh.rotation.y += dt * 1.2 * speedFactor;
      });

      if (REFS.asteroidBelt && STATE.showAsteroids) {
        REFS.asteroidBelt.rotation.y += dt * 0.02 * speedFactor;
      }

      if (REFS.halleyMesh && STATE.showHalley) {
        const orbitalSpeed = (2 * Math.PI / 16.0) * speedFactor;
        REFS.halleyMesh.orbitAngle += dt * orbitalSpeed;

        const semiMajor = 150;
        const ecc = 0.85;
        const semiMinor = semiMajor * Math.sqrt(1 - ecc * ecc);
        const orbitTilt = 0.35;

        const xOrb = semiMajor * Math.cos(REFS.halleyMesh.orbitAngle) - (semiMajor * ecc);
        const zOrb = semiMinor * Math.sin(REFS.halleyMesh.orbitAngle);

        REFS.halleyMesh.position.x = xOrb;
        REFS.halleyMesh.position.y = zOrb * Math.sin(orbitTilt);
        REFS.halleyMesh.position.z = zOrb * Math.cos(orbitTilt);

        if (REFS.halleyParticles && STATE.showTail) {
          const pos = REFS.halleyMesh.position;
          const tailDir = pos.normalizeToNew();

          REFS.halleyParticles.direction1 = tailDir.scale(6.5);
          REFS.halleyParticles.direction2 = tailDir.scale(8.5);

          const distanceToSun = pos.length();
          const intensity = Math.max(0.04, 1.0 - (distanceToSun - 22.5) / 220.0);

          REFS.halleyParticles.emitRate = 1200 * intensity;
          REFS.halleyParticles.minSize = 0.3 * intensity;
          REFS.halleyParticles.maxSize = 1.4 * intensity;
        }
      }

      if (STATE.cameraTarget !== 'solar' && STATE.cameraTarget !== 'panorama' && STATE.cameraTarget !== 'sun') {
        if (STATE.cameraTarget === 'halley' && REFS.halleyMesh) {
          REFS.camera.target.copyFrom(REFS.halleyMesh.position);
        } else {
          const targetPlanet = REFS.planets.find(p => p.data.name.toLowerCase() === STATE.cameraTarget);
          if (targetPlanet) {
            REFS.camera.target.copyFrom(targetPlanet.mesh.position);
          }
        }
      }
    }

      const sldGlobalSpeed = document.getElementById('sldGlobalSpeed');
      const lblGlobalSpeed = document.getElementById('lblGlobalSpeed');
      sldGlobalSpeed.addEventListener('input', (e) => {
        STATE.globalSpeed = parseFloat(e.target.value);
        lblGlobalSpeed.innerText = STATE.globalSpeed.toFixed(1) + 'x';
      });

      const sldOrbitalMult = document.getElementById('sldOrbitalMult');
      const lblOrbitalMult = document.getElementById('lblOrbitalMult');
      sldOrbitalMult.addEventListener('input', (e) => {
        STATE.orbitalSpeedMultiplier = parseFloat(e.target.value);
        lblOrbitalMult.innerText = STATE.orbitalSpeedMultiplier.toFixed(2) + 'x';
      });

      const btnPause = document.getElementById('btnPause');
      btnPause.addEventListener('click', () => {
        STATE.isPaused = !STATE.isPaused;
        btnPause.innerText = STATE.isPaused ? '▶ Reanudar Simulación' : '⏸ Pausar Simulación';
        btnPause.style.background = STATE.isPaused 
          ? 'linear-gradient(135deg, rgba(34, 197, 94, 0.5), rgba(22, 163, 74, 0.4))' 
          : 'linear-gradient(135deg, rgba(59, 130, 246, 0.5), rgba(37, 99, 235, 0.4))';
      });

      const chkOrbits = document.getElementById('chkOrbits');
      chkOrbits.addEventListener('change', (e) => {
        STATE.showOrbits = e.target.checked;
        REFS.orbits.forEach(o => o.setEnabled(STATE.showOrbits));
      });

      const chkLabels = document.getElementById('chkLabels');
      chkLabels.addEventListener('change', (e) => {
        STATE.showLabels = e.target.checked;
        REFS.planets.forEach(p => p.label.setEnabled(STATE.showLabels));
      });

      const chkHalley = document.getElementById('chkHalley');
      const chkTail = document.getElementById('chkTail');
      chkHalley.addEventListener('change', (e) => {
        STATE.showHalley = e.target.checked;
        if (REFS.halleyMesh) REFS.halleyMesh.setEnabled(STATE.showHalley);
        if (REFS.halleyParticles) {
          if (STATE.showHalley && STATE.showTail) REFS.halleyParticles.start();
          else REFS.halleyParticles.stop();
        }
      });

      chkTail.addEventListener('change', (e) => {
        STATE.showTail = e.target.checked;
        if (REFS.halleyParticles) {
          if (STATE.showTail && STATE.showHalley) REFS.halleyParticles.start();
          else REFS.halleyParticles.stop();
        }
      });

      const chkAsteroids = document.getElementById('chkAsteroids');
      chkAsteroids.addEventListener('change', (e) => {
        STATE.showAsteroids = e.target.checked;
        if (REFS.asteroidBelt) REFS.asteroidBelt.setEnabled(STATE.showAsteroids);
        actualizarContadorObjetos();
      });

      const chkNebulas = document.getElementById('chkNebulas');
      chkNebulas.addEventListener('change', (e) => {
        STATE.showNebulas = e.target.checked;
        REFS.nebulas.forEach(n => n.setEnabled(STATE.showNebulas));
        actualizarContadorObjetos();
      });

      const sldPlanetScale = document.getElementById('sldPlanetScale');
      const lblPlanetScale = document.getElementById('lblPlanetScale');
      sldPlanetScale.addEventListener('input', (e) => {
        STATE.planetScale = parseFloat(e.target.value);
        lblPlanetScale.innerText = STATE.planetScale.toFixed(2) + 'x';
        
        REFS.planets.forEach(p => {
          const scale = p.data.size * STATE.planetScale;
          p.mesh.scaling = new BABYLON.Vector3(scale, scale, scale);
        });
      });

      const selCamera = document.getElementById('selCamera');
      selCamera.addEventListener('change', (e) => {
        aplicarVistaCamara(e.target.value);
      });

      const selTheme = document.getElementById('selTheme');
      selTheme.addEventListener('change', (e) => {
        STATE.activeTheme = e.target.value;
        aplicarTemaEstetico(STATE.activeTheme);
      });

      const chkBloom = document.getElementById('chkBloom');
      chkBloom.addEventListener('change', (e) => {
        STATE.bloomEnabled = e.target.checked;
        if (REFS.renderingPipeline) {
          REFS.renderingPipeline.bloomEnabled = STATE.bloomEnabled;
        }
        if (REFS.glowLayer) {
          REFS.glowLayer.intensity = STATE.bloomEnabled ? 1.35 : 0.0;
        }
      });

      const selSunColor = document.getElementById('selSunColor');
      selSunColor.addEventListener('change', (e) => {
        STATE.sunColorKey = e.target.value;
        actualizarColorSol(STATE.sunColorKey);
      });

      const toggleBtn = document.getElementById('togglePanel');
      const panel = document.getElementById('panel');
      toggleBtn.addEventListener('click', () => {
        panel.classList.toggle('collapsed');
      });
    }

    function aplicarVistaCamara(vista) {
      STATE.cameraTarget = vista;
      
      if (vista !== 'solar' && vista !== 'panorama') {
        REFS.camera.useAutoRotationBehavior = false;
      } else {
        REFS.camera.useAutoRotationBehavior = true;
      }

      switch (vista) {
        case 'solar':
          transicionarCamara(BABYLON.Vector3.Zero(), -Math.PI / 2, Math.PI / 3.5, 180);
          break;
        case 'sun':
          transicionarCamara(BABYLON.Vector3.Zero(), -Math.PI / 2, Math.PI / 2.5, 25);
          break;
        case 'earth': {
          const earth = REFS.planets.find(p => p.data.isEarth);
          if (earth) {
            transicionarCamara(earth.mesh.position, REFS.camera.alpha, Math.PI / 3.2, 14);
          }
          break;
        }
        case 'saturn': {
          const saturn = REFS.planets.find(p => p.data.isSaturn);
          if (saturn) {
            transicionarCamara(saturn.mesh.position, REFS.camera.alpha, Math.PI / 3.0, 26);
          }
          break;
        }
        case 'panorama':
          transicionarCamara(BABYLON.Vector3.Zero(), -Math.PI / 2, Math.PI / 4.5, 620);
          break;
        case 'halley':
          if (REFS.halleyMesh) {
            transicionarCamara(REFS.halleyMesh.position, REFS.camera.alpha, Math.PI / 3.2, 22);
          }
          break;
      }
    }

    function transicionarCamara(destTarget, destAlpha, destBeta, destRadius) {
      const duration = 90;
      let frame = 0;
      
      const startTarget = REFS.camera.target.clone();
      const startAlpha = REFS.camera.alpha;
      const startBeta = REFS.camera.beta;
      const startRadius = REFS.camera.radius;

      if (window.cameraTransitionObserver) {
        REFS.scene.onBeforeRenderObservable.remove(window.cameraTransitionObserver);
      }

      window.cameraTransitionObserver = REFS.scene.onBeforeRenderObservable.add(() => {
        frame++;
        const t = Math.min(frame / duration, 1.0);
        
        const ease = 1.0 - Math.pow(1.0 - t, 3);

        REFS.camera.target.x = startTarget.x + (destTarget.x - startTarget.x) * ease;
        REFS.camera.target.y = startTarget.y + (destTarget.y - startTarget.y) * ease;
        REFS.camera.target.z = startTarget.z + (destTarget.z - startTarget.z) * ease;

        REFS.camera.alpha = startAlpha + (destAlpha - startAlpha) * ease;
        REFS.camera.beta = startBeta + (destBeta - startBeta) * ease;
        REFS.camera.radius = startRadius + (destRadius - startRadius) * ease;

        if (t >= 1.0) {
          REFS.scene.onBeforeRenderObservable.remove(window.cameraTransitionObserver);
          window.cameraTransitionObserver = null;
        }
      });
    }

    function aplicarTemaEstetico(theme) {
      const panel = document.getElementById('panel');
      const stats = document.getElementById('statsPanel');

      switch (theme) {
        case 'classic':
          REFS.hemiLight.diffuse = new BABYLON.Color3(0.95, 0.85, 0.7);
          REFS.hemiLight.intensity = 0.2;
          REFS.scene.clearColor = new BABYLON.Color4(0.02, 0.015, 0.01, 1.0);
          
          panel.style.background = 'rgba(28, 20, 12, 0.88)';
          panel.style.borderColor = 'rgba(217, 119, 6, 0.35)';
          stats.style.background = 'rgba(28, 20, 12, 0.8)';
          stats.style.borderColor = 'rgba(217, 119, 6, 0.25)';
          break;

        case 'dark':
          REFS.hemiLight.diffuse = new BABYLON.Color3(0.3, 0.3, 0.4);
          REFS.hemiLight.intensity = 0.08;
          REFS.scene.clearColor = new BABYLON.Color4(0.0, 0.0, 0.005, 1.0);
          
          panel.style.background = 'rgba(15, 15, 20, 0.92)';
          panel.style.borderColor = 'rgba(226, 232, 240, 0.15)';
          stats.style.background = 'rgba(15, 15, 20, 0.85)';
          stats.style.borderColor = 'rgba(226, 232, 240, 0.1)';
          break;

        case 'futuristic':
        default:
          REFS.hemiLight.diffuse = new BABYLON.Color3(0.8, 0.9, 1.0);
          REFS.hemiLight.intensity = 0.15;
          REFS.scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.03, 1.0);
          
          panel.style.background = 'rgba(10, 15, 30, 0.85)';
          panel.style.borderColor = 'rgba(120, 160, 255, 0.3)';
          stats.style.background = 'rgba(10, 15, 30, 0.8)';
          stats.style.borderColor = 'rgba(120, 160, 255, 0.25)';
          break;
      }
    }

    function actualizarColorSol(colorKey) {
      const sc = SUN_COLORS[colorKey];
      if (!sc) return;

      if (REFS.sunMesh && REFS.sunMesh.material) {
        REFS.sunMesh.material.emissiveColor = new BABYLON.Color3(...sc.core);
        REFS.sunMesh.material.diffuseColor = new BABYLON.Color3(...sc.core);
      }

      if (REFS.sunLight) {
        REFS.sunLight.diffuse = new BABYLON.Color3(...sc.point);
      }

      if (REFS.sunCoronaSet && REFS.sunCoronaSet.systems) {
        REFS.sunCoronaSet.systems.forEach(sys => {
          sys.color1 = new BABYLON.Color4(sc.core[0], sc.core[1], sc.core[2] * 1.2, 0.95);
          sys.color2 = new BABYLON.Color4(sc.core[0] * 0.9, sc.core[1] * 0.5, 0.0, 0.85);
          sys.particleTexture = makeFlareTexture(new BABYLON.Color3(...sc.core));
        });
      }
    }

    function actualizarContadorObjetos() {
      setTimeout(() => {
        if (!REFS.scene) return;
        
        let meshes = REFS.scene.meshes.length;
        
        let totalRendered = meshes;
        if (REFS.asteroidBelt && STATE.showAsteroids) {
          totalRendered += 219;
        }

        document.getElementById('objCount').innerText = `Objetos en escena: ${totalRendered}`;
      }, 200);
    }
  </script>
</body>
