<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universo 3D — Sistema Solar, Halley y Nebulosas | Opencode + GLM-5.2</title>
<style>
  /* ===================================================================
     RESET + BASE
     =================================================================== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #05060d; color: #e8eefc;
    -webkit-font-smoothing: antialiased;
  }
  :root {
    --panel-bg: rgba(10, 15, 30, 0.85);
    --panel-border: rgba(120, 160, 255, 0.30);
    --accent: #7aa2ff;
    --faint: #9fb0d0;
    --track: rgba(255,255,255,0.10);
  }
  /* Tema clásico */
  body.theme-clasico  { background: #000; }
  body.theme-clasico  #panel { background: rgba(0,0,0,0.80); border-color: rgba(255,255,255,0.18); }
  /* Tema oscuro */
  body.theme-oscuro   { background: #0c0f1f; }
  body.theme-oscuro   #panel { background: rgba(8,10,22,0.92); border-color: rgba(180,120,255,0.25); }

  #renderCanvas { width: 100vw; height: 100vh; display: block; touch-action: none; outline: none; }

  /* ===================================================================
     PANEL DE CONFIGURACIÓN
     =================================================================== */
  #panel {
    position: fixed; top: 14px; right: 14px;
    width: 300px; max-height: calc(100vh - 28px);
    overflow-y: auto; overflow-x: hidden;
    background: var(--panel-bg);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 12px 14px 16px;
    font-size: 13px; line-height: 1.4;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55);
    z-index: 10;
    transition: transform .25s ease, opacity .25s ease;
  }
  #panel.collapsed { transform: translateX(calc(100% + 20px)); opacity: 0; pointer-events: none; }
  #panelToggle {
    position: fixed; top: 14px; right: 14px; z-index: 11;
    background: var(--panel-bg); border: 1px solid var(--panel-border);
    color: var(--accent); width: 40px; height: 40px; border-radius: 10px;
    font-size: 18px; cursor: pointer; display: none;
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  }
  #panelToggle.visible { display: block; }

  #panel h1 {
    font-size: 14px; font-weight: 600; color: #fff;
    letter-spacing: .3px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  #panel h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  #panel .section { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  #panel .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  #panel .section-title {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--accent); margin-bottom: 8px; font-weight: 600;
  }
  #panel .control { margin-bottom: 8px; }
  #panel label { display: flex; justify-content: space-between; align-items: center; gap: 8px; color: var(--faint); }
  #panel label .val { color: #fff; font-variant-numeric: tabular-nums; font-size: 11.5px; min-width: 34px; text-align: right; }

  /* Range slider */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 3px;
    background: var(--track); margin-top: 5px; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid #fff;
    box-shadow: 0 0 8px rgba(122,162,255,.7);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid #fff;
  }

  /* Checkbox */
  .check { display: flex !important; justify-content: flex-start !important; gap: 8px; cursor: pointer; user-select: none; }
  .check input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; margin-top: 1px; flex: 0 0 auto; }

  /* Select */
  select, button {
    width: 100%; padding: 6px 8px; font-size: 12px; color: #fff;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 7px; cursor: pointer; outline: none;
  }
  select:hover, button:hover { background: rgba(255,255,255,0.12); border-color: var(--accent); }
  select option { background: #0c1024; color: #fff; }
  button.primary { background: linear-gradient(135deg, #2a4cff, #6a3cff); border: none; font-weight: 600; }
  button.primary:hover { filter: brightness(1.15); }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }

  /* ===================================================================
     PANEL DE INFORMACIÓN
     =================================================================== */
  #info {
    position: fixed; left: 14px; bottom: 14px; z-index: 10;
    background: var(--panel-bg);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 10px 12px;
    font-size: 11.5px; color: var(--faint); line-height: 1.55;
    min-width: 200px;
  }
  #info b { color: #fff; font-variant-numeric: tabular-nums; }
  #info .fps { color: #6dffa6; font-weight: 600; }
  #info .help { margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 10.5px; }

  /* ===================================================================
     SCROLLBAR
     =================================================================== */
  #panel::-webkit-scrollbar { width: 7px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: rgba(122,162,255,0.35); border-radius: 4px; }
  #panel::-webkit-scrollbar-thumb:hover { background: rgba(122,162,255,0.55); }

  /* ===================================================================
     LOADER
     =================================================================== */
  #loader {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #05060d; color: var(--accent); gap: 14px;
    transition: opacity .6s ease; font-size: 13px; letter-spacing: 1px;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  #loader .ring {
    width: 42px; height: 42px; border-radius: 50%;
    border: 3px solid rgba(122,162,255,0.18); border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===================================================================
     RESPONSIVE
     =================================================================== */
  @media (max-width: 600px) {
    #panel { width: calc(100vw - 28px); top: 60px; max-height: calc(100vh - 80px); }
    #panelToggle.visible { display: block; }
    #info { font-size: 10.5px; min-width: 0; right: 14px; }
    #info .help { display: none; }
  }
</style>
</head>
<body class="theme-futurista">

  <canvas id="renderCanvas"></canvas>

  <button id="panelToggle" title="Mostrar/ocultar panel" aria-label="Panel">&#9776;</button>

  <!-- =================== PANEL DE CONFIGURACIÓN =================== -->
  <div id="panel" role="region" aria-label="Panel de configuración">
    <h1><span class="dot"></span> Universo 3D · Panel</h1>

    <!-- SECCIÓN 1 — TIEMPO Y VELOCIDAD -->
    <div class="section">
      <div class="section-title">⏱ Tiempo y velocidad</div>
      <div class="control">
        <label>Velocidad global <span class="val" id="globalSpeedVal">1.0×</span></label>
        <input type="range" id="globalSpeed" min="0" max="10" step="0.1" value="1">
      </div>
      <div class="control">
        <label>Velocidad orbital <span class="val" id="orbitalMultVal">1.0×</span></label>
        <input type="range" id="orbitalMult" min="0.1" max="3" step="0.1" value="1">
      </div>
      <div class="control">
        <button class="primary" id="pauseBtn">⏸ Pausar</button>
      </div>
    </div>

    <!-- SECCIÓN 2 — VISUALIZACIÓN -->
    <div class="section">
      <div class="section-title">🔭 Visualización</div>
      <div class="control"><label class="check"><input type="checkbox" id="showOrbits" checked> Mostrar órbitas</label></div>
      <div class="control"><label class="check"><input type="checkbox" id="showNames" checked> Mostrar nombres</label></div>
      <div class="control"><label class="check"><input type="checkbox" id="showHalley" checked> Mostrar cometa Halley</label></div>
      <div class="control"><label class="check"><input type="checkbox" id="showTail" checked> Mostrar cola del cometa</label></div>
      <div class="control"><label class="check"><input type="checkbox" id="showAsteroids" checked> Mostrar cinturón de asteroides</label></div>
      <div class="control"><label class="check"><input type="checkbox" id="showNebulas" checked> Mostrar nebulosas de fondo</label></div>
      <div class="control">
        <label>Vista de cámara</label>
        <select id="cameraView">
          <option value="system">Sistema Solar</option>
          <option value="sun">Sol cercano</option>
          <option value="earth">Tierra</option>
          <option value="saturn">Saturno</option>
          <option value="pano">Panorámica</option>
          <option value="halley">Halley</option>
        </select>
      </div>
      <div class="control">
        <label>Tamaño relativo <span class="val" id="sizeScaleVal">1.0×</span></label>
        <input type="range" id="sizeScale" min="0.5" max="3" step="0.1" value="1">
      </div>
    </div>

    <!-- SECCIÓN 3 — ESTÉTICA -->
    <div class="section">
      <div class="section-title">🎨 Estética</div>
      <div class="control">
        <label>Tema</label>
        <select id="theme">
          <option value="futurista">Futurista</option>
          <option value="clasico">Clásico</option>
          <option value="oscuro">Oscuro</option>
        </select>
      </div>
      <div class="control"><label class="check"><input type="checkbox" id="bloomToggle" checked> Activar bloom / glow</label></div>
      <div class="control">
        <label>Color del Sol</label>
        <select id="sunColor">
          <option value="blanco">Blanco</option>
          <option value="amarillo" selected>Amarillo</option>
          <option value="naranja">Naranja</option>
          <option value="rojo">Rojo</option>
        </select>
      </div>
    </div>
  </div>

  <!-- =================== PANEL DE INFORMACIÓN =================== -->
  <div id="info" role="status" aria-live="polite">
    <div><span class="fps" id="fps">--</span> FPS · <b id="objCount">0</b> objetos</div>
    <div class="help">🖱️ Click izq: rotar · Rueda: zoom · Click der: pan</div>
  </div>

  <!-- =================== LOADER =================== -->
  <div id="loader"><div class="ring"></div><div>Cargando el universo…</div></div>

  <!-- BabylonJS 7.x (CDN oficial) -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
  /* ===================================================================
     UNIVERSO 3D — BabylonJS
     Entrada: Opencode + GLM-5.2 · Obra original.
     APIs validadas con context7 (/babylonjs/documentation).
     Reglas de corrección cumplidas:
       1) Sol en el FOCO de la elipse:
            x = a·cosθ − a·e ,  z = b·sinθ ,  b = a·√(1−e²)
       2) Cola del cometa SIEMPRE alejándose del Sol:
            dir = normalize(cometa − Sol)  [sin mutar la posición]
     =================================================================== */
  (function () {
    'use strict';

    /* -----------------------------------------------------------------
       1) CONSTANTES Y DATOS
       ----------------------------------------------------------------- */
    const ORBITAL_K = 12;            // Constante de Kepler simplificada (velocidad ∝ 1/distancia)
    const SUN_RADIUS = 6;
    const STAR_BOX = 1000;           // Semilado de la caja de estrellas de fondo
    const STAR_COUNT = 3200;

    // Paleta de color del sol por nombre (emissivo + luz puntual)
    const SUN_COLORS = {
      blanco:  { emissive: [1.00, 0.98, 0.92], light: [1.0, 0.97, 0.90] },
      amarillo:{ emissive: [1.00, 0.85, 0.35], light: [1.0, 0.95, 0.70] },
      naranja: { emissive: [1.00, 0.55, 0.18], light: [1.0, 0.78, 0.45] },
      rojo:    { emissive: [1.00, 0.32, 0.20], light: [1.0, 0.55, 0.40] }
    };

    // Array de planetas (8 planetas + Plutón enano)
    // distance: semieje mayor (u) · size: radio relativo · ecc: excentricidad
    // tilt: inclinación axial (rad) · incl: inclinación orbital (rad)
    // retro: rotación retrógrada · tex: tipo de textura procedural
    const PLANETS = [
      { name: "Mercurio", distance: 16, size: 0.50, color: "#9c9c9c", ecc: 0.20, tilt: 0.03,  incl: 0.122, retro: false, tex: "rocky",   atm: null },
      { name: "Venus",    distance: 22, size: 0.92, color: "#e8b86d", ecc: 0.05, tilt: 2.62,  incl: 0.060, retro: true,  tex: "rocky",   atm: "#ffe2a8" },
      { name: "Tierra",   distance: 30, size: 1.00, color: "#2b6fd6", ecc: 0.05, tilt: 0.41,  incl: 0.000, retro: false, tex: "earth",   atm: "#8fc8ff" },
      { name: "Marte",    distance: 40, size: 0.72, color: "#c1440e", ecc: 0.12, tilt: 0.44,  incl: 0.032, retro: false, tex: "rocky",   atm: "#ff9a5a" },
      { name: "Júpiter",  distance: 75, size: 3.20, color: "#c9a07a", ecc: 0.08, tilt: 0.05,  incl: 0.022, retro: false, tex: "bands",   atm: null },
      { name: "Saturno",  distance: 105,size: 2.80, color: "#e3d9b0", ecc: 0.08, tilt: 0.47,  incl: 0.043, retro: false, tex: "bands",   atm: null, rings: "#e8d9a8" },
      { name: "Urano",    distance: 135,size: 1.80, color: "#9fe0e6", ecc: 0.07, tilt: 1.71,  incl: 0.013, retro: true,  tex: "gas",     atm: "#bdf2ff" },
      { name: "Neptuno",  distance: 160,size: 1.70, color: "#3b5bdb", ecc: 0.06, tilt: 0.49,  incl: 0.030, retro: false, tex: "gas",     atm: "#7aa0ff" },
      { name: "Plutón",   distance: 190,size: 0.36, color: "#b8b0a8", ecc: 0.25, tilt: 1.20,  incl: 0.300, retro: false, tex: "rocky",   atm: null }
    ];

    // Estado global de la simulación (mutado por la UI)
    const state = {
      globalSpeed: 1.0,
      orbitalMult: 1.0,
      paused: false,
      showOrbits: true,
      showNames: true,
      showHalley: true,
      showTail: true,
      showAsteroids: true,
      showNebulas: true,
      sizeScale: 1.0,
      bloom: true,
      sunColor: "amarillo",
      cameraMode: "system"
    };

    /* -----------------------------------------------------------------
       2) ENGINE + SCENE
       ----------------------------------------------------------------- */
    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true, antialias: true });
    const scene  = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.02, 0.025, 0.05, 1);

    // Colecciones para gestión global de visibilidad / conteo
    const orbits = [];        // líneas de órbita
    const labels = [];        // planos con nombres
    const asteroids = [];     // mallas del cinturón
    const nebulas = [];       // planos de nebulosa
    const planetMeshes = [];  // núcleos de planetas (para escalado)
    let sunMesh = null, sunPointLight = null, sunCorona = null;
    let halleyNucleus = null, halleyTail = null, halleyOrbit = null;
    let glowLayer = null, pipeline = null;
    let earthMesh = null, saturnMesh = null;

    /* -----------------------------------------------------------------
       3) CÁMARA (ArcRotateCamera + auto-rotación)
       ----------------------------------------------------------------- */
    const camera = new BABYLON.ArcRotateCamera("camera",
                      -Math.PI / 2, Math.PI / 2.25, 180,
                      BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 30;
    camera.upperRadiusLimit = 2000;
    camera.wheelPrecision = 2.5;
    camera.panningSensibility = 90;
    camera.minZ = 0.1;
    camera.useAutoRotationBehavior = true;
    if (camera.autoRotationBehavior) {
      camera.autoRotationBehavior.idleRotationSpeed = 0.03;
      camera.autoRotationBehavior.idleRotationWaitTime = 2500;
      camera.autoRotationBehavior.idleRotationSpinupTime = 1200;
    }

    /* -----------------------------------------------------------------
       4) ILUMINACIÓN (Hemisférica tenue + PointLight en el Sol)
       ----------------------------------------------------------------- */
    const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
    hemi.intensity = 0.1;
    hemi.diffuse = new BABYLON.Color3(0.8, 0.85, 1);
    hemi.groundColor = new BABYLON.Color3(0.05, 0.05, 0.08);

    sunPointLight = new BABYLON.PointLight("sunLight", BABYLON.Vector3.Zero(), scene);
    sunPointLight.intensity = 2.0;
    sunPointLight.diffuse = new BABYLON.Color3(1, 0.95, 0.85);
    sunPointLight.specular = new BABYLON.Color3(1, 0.9, 0.7);
    sunPointLight.range = 2000;

    /* -----------------------------------------------------------------
       5) FUNCIONES HELPER (texturas procedurales)
       ----------------------------------------------------------------- */

    /**
     * Crea una textura "flare" redonda y suave (base de partículas).
     * @returns {BABYLON.DynamicTexture}
     */
    function makeFlareTexture() {
      const size = 64;
      const tex = new BABYLON.DynamicTexture("flareTex", { width: size, height: size }, scene, false);
      const ctx = tex.getContext();
      const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      g.addColorStop(0.0, "rgba(255,255,255,1)");
      g.addColorStop(0.35, "rgba(255,255,255,0.7)");
      g.addColorStop(1.0, "rgba(255,255,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      tex.hasAlpha = true;
      tex.update();
      return tex;
    }

    /**
     * Crea una textura para un planeta a partir de un tipo y color base.
     * @param {string} kind - "rocky" | "earth" | "bands" | "gas"
     * @param {string} hex  - color base
     * @returns {BABYLON.DynamicTexture}
     */
    function makePlanetTexture(kind, hex) {
      const W = 512, H = 256;
      const tex = new BABYLON.DynamicTexture("planet_" + kind + "_" + Math.random().toString(36).slice(2), { width: W, height: H }, scene, false);
      const ctx = tex.getContext();
      const base = hexToRgb(hex);

      if (kind === "bands") {
        // Bandas horizontales (Júpiter / Saturno)
        for (let y = 0; y < H; y++) {
          const t = Math.sin(y * 0.08) * 0.5 + 0.5;
          const r = Math.round(base.r * (0.7 + 0.5 * t));
          const g = Math.round(base.g * (0.7 + 0.5 * t));
          const b = Math.round(base.b * (0.7 + 0.5 * t));
          ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
          ctx.fillRect(0, y, W, 1);
        }
        // Mancha tipo Gran Mancha Roja
        ctx.fillStyle = "rgba(180,60,40,0.55)";
        ctx.beginPath(); ctx.ellipse(W * 0.6, H * 0.62, 34, 14, 0, 0, Math.PI * 2); ctx.fill();
      } else if (kind === "earth") {
        // Tierra: océano azul + continentes verdes
        ctx.fillStyle = "#1f4fa8"; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#2e8b3d";
        for (let i = 0; i < 26; i++) {
          const x = Math.random() * W, y = H * 0.2 + Math.random() * H * 0.6;
          const rx = 14 + Math.random() * 46, ry = 10 + Math.random() * 28;
          ctx.beginPath(); ctx.ellipse(x, y, rx, ry, Math.random() * Math.PI, 0, Math.PI * 2); ctx.fill();
        }
        // Casquetes polares
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.fillRect(0, 0, W, 14); ctx.fillRect(0, H - 14, W, 14);
      } else if (kind === "gas") {
        // Gigante helada: gradiente suave vertical
        const grd = ctx.createLinearGradient(0, 0, 0, H);
        grd.addColorStop(0, lighten(hex, 0.25));
        grd.addColorStop(0.5, hex);
        grd.addColorStop(1, lighten(hex, -0.25));
        ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
      } else {
        // Rocoso: base con crateres
        ctx.fillStyle = hex; ctx.fillRect(0, 0, W, H);
        for (let i = 0; i < 60; i++) {
          const x = Math.random() * W, y = Math.random() * H, r = 2 + Math.random() * 8;
          ctx.fillStyle = "rgba(" + Math.max(0, base.r - 40) + "," + Math.max(0, base.g - 40) + "," + Math.max(0, base.b - 40) + ",0.5)";
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
        }
      }
      tex.update();
      return tex;
    }

    /**
     * Crea una textura de nebulosa con gradiente radial entre dos colores.
     * @param {string} c1
     * @param {string} c2
     * @returns {BABYLON.DynamicTexture}
     */
    function makeNebulaTexture(c1, c2) {
      const S = 512;
      const tex = new BABYLON.DynamicTexture("neb_" + Math.random().toString(36).slice(2), { width: S, height: S }, scene, false);
      const ctx = tex.getContext();
      ctx.clearRect(0, 0, S, S);
      // Varias capas radiales desplazadas para dar forma orgánica
      for (let i = 0; i < 6; i++) {
        const cx = S / 2 + (Math.random() - 0.5) * S * 0.4;
        const cy = S / 2 + (Math.random() - 0.5) * S * 0.4;
        const r = S * (0.25 + Math.random() * 0.3);
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0, hexToRgba(c1, 0.35));
        g.addColorStop(0.5, hexToRgba(c2, 0.18));
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g; ctx.fillRect(0, 0, S, S);
      }
      tex.hasAlpha = true;
      tex.update();
      return tex;
    }

    /** Textura con el nombre de un planeta (etiqueta flotante). */
    function makeLabelTexture(text) {
      const W = 256, H = 64;
      const tex = new BABYLON.DynamicTexture("lbl_" + text, { width: W, height: H }, scene, true);
      const ctx = tex.getContext();
      ctx.clearRect(0, 0, W, H);
      ctx.font = "600 26px system-ui, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.9)"; ctx.shadowBlur = 6;
      ctx.fillStyle = "#ffffff";
      ctx.fillText(text, W / 2, H / 2);
      tex.hasAlpha = true;
      tex.update();
      return tex;
    }

    // --- utilidades de color ---
    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      return { r: parseInt(h.substr(0, 2), 16), g: parseInt(h.substr(2, 2), 16), b: parseInt(h.substr(4, 2), 16) };
    }
    function hexToRgba(hex, a) {
      const c = hexToRgb(hex);
      return "rgba(" + c.r + "," + c.g + "," + c.b + "," + a + ")";
    }
    function lighten(hex, amt) {
      const c = hexToRgb(hex);
      const f = (v) => Math.max(0, Math.min(255, Math.round(v + amt * 255)));
      return "rgb(" + f(c.r) + "," + f(c.g) + "," + f(c.b) + ")";
    }

    // Textura flare compartida por todos los ParticleSystem
    const FLARE_TEX = makeFlareTexture();

    /* -----------------------------------------------------------------
       6) createStars — 3000+ estrellas estáticas de fondo
       ----------------------------------------------------------------- */
    function createStars() {
      const ps = new BABYLON.ParticleSystem("stars", STAR_COUNT, scene);
      ps.particleTexture = FLARE_TEX;
      ps.emitter = BABYLON.Vector3.Zero();
      ps.particleEmitterType = new BABYLON.BoxParticleEmitter();
      ps.particleEmitterType.minBox = new BABYLON.Vector3(-STAR_BOX, -STAR_BOX, -STAR_BOX);
      ps.particleEmitterType.maxBox = new BABYLON.Vector3(STAR_BOX, STAR_BOX, STAR_BOX);
      ps.color1 = new BABYLON.Color4(1, 1, 1, 1);
      ps.color2 = new BABYLON.Color4(0.75, 0.85, 1, 1);
      ps.colorDead = new BABYLON.Color4(1, 1, 1, 1);
      // Sin movimiento (estrellas fijas): sin velocidad ni gravedad
      ps.minEmitBox = new BABYLON.Vector3(0, 0, 0);
      ps.maxEmitBox = new BABYLON.Vector3(0, 0, 0);
      ps.direction1 = new BABYLON.Vector3(0, 0, 0);
      ps.direction2 = new BABYLON.Vector3(0, 0, 0);
      ps.minEmitPower = 0; ps.maxEmitPower = 0;
      ps.gravity = BABYLON.Vector3.Zero();
      ps.minSize = 0.3; ps.maxSize = 1.5;
      ps.minLifeTime = 9999; ps.maxLifeTime = 9999;   // "infinito": no se reciclan
      ps.emitRate = STAR_COUNT;
      ps.minAngularSpeed = 0; ps.maxAngularSpeed = 0;
      ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
      ps.start();
      return ps;
    }

    /* -----------------------------------------------------------------
       7) createSun — núcleo + corona (ParticleHelper con fallback)
       ----------------------------------------------------------------- */
    function createSun() {
      sunMesh = BABYLON.MeshBuilder.CreateSphere("sun", { diameter: SUN_RADIUS * 2, segments: 32 }, scene);
      const mat = new BABYLON.StandardMaterial("sunMat", scene);
      mat.disableLighting = true;            // brillo propio independiente de la luz
      const sc = SUN_COLORS[state.sunColor];
      mat.emissiveColor = new BABYLON.Color3(sc.emissive[0], sc.emissive[1], sc.emissive[2]);
      sunMesh.material = mat;

      // Corona: API oficial CreateAsync("sun"). Si falla, degradamos a un ParticleSystem propio.
      try {
        if (BABYLON.ParticleHelper && BABYLON.ParticleHelper.CreateAsync) {
          BABYLON.ParticleHelper.CreateAsync("sun", scene).then(function (set) {
            try {
              set.emitter = sunMesh;
              set.start();
              sunCorona = set;
            } catch (e) { sunCorona = createFallbackCorona(); }
          }).catch(function () { sunCorona = createFallbackCorona(); });
        } else {
          sunCorona = createFallbackCorona();
        }
      } catch (e) {
        sunCorona = createFallbackCorona();
      }
      return sunMesh;
    }

    /** Corona de respuesto si el efecto "sun" del ParticleHelper no está disponible. */
    function createFallbackCorona() {
      const ps = new BABYLON.ParticleSystem("sunCorona", 800, scene);
      ps.particleTexture = FLARE_TEX;
      ps.emitter = sunMesh;
      ps.minEmitBox = new BABYLON.Vector3(-SUN_RADIUS * 0.3, -SUN_RADIUS * 0.3, -SUN_RADIUS * 0.3);
      ps.maxEmitBox = new BABYLON.Vector3(SUN_RADIUS * 0.3, SUN_RADIUS * 0.3, SUN_RADIUS * 0.3);
      const sc = SUN_COLORS[state.sunColor];
      ps.color1 = new BABYLON.Color4(sc.emissive[0], sc.emissive[1] * 0.6, sc.emissive[2] * 0.3, 1);
      ps.color2 = new BABYLON.Color4(1, 0.5, 0.1, 1);
      ps.colorDead = new BABYLON.Color4(0.2, 0.05, 0, 0);
      ps.minSize = 0.6; ps.maxSize = 2.4;
      ps.minLifeTime = 0.6; ps.maxLifeTime = 1.4;
      ps.emitRate = 400;
      ps.direction1 = new BABYLON.Vector3(-1, -1, -1);
      ps.direction2 = new BABYLON.Vector3(1, 1, 1);
      ps.minEmitPower = 0.3; ps.maxEmitPower = 1.2;
      ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
      ps.start();
      return ps;
    }

    /* -----------------------------------------------------------------
       8) createPlanets — esferas con material, atmósfera y etiqueta
       9) createOrbits    — líneas elípticas con el Sol en el FOCO
       ----------------------------------------------------------------- */
    function ellipsePoint(a, e, theta) {
      const b = a * Math.sqrt(Math.max(0, 1 - e * e));
      // Sol en el foco: centro de la elipse desplazado (-a·e) → Sol queda en (0,0,0)
      return { x: a * Math.cos(theta) - a * e, z: b * Math.sin(theta) };
    }

    function createPlanets() {
      PLANETS.forEach(function (p, idx) {
        // --- núcleo del planeta (radio unitario + escalado) ---
        const mesh = BABYLON.MeshBuilder.CreateSphere("planet_" + p.name, { diameter: 2, segments: 32 }, scene);
        mesh.scaling.set(p.size, p.size, p.size);
        mesh.rotation.z = p.tilt;

        const mat = new BABYLON.StandardMaterial("mat_" + p.name, scene);
        mat.diffuseTexture = makePlanetTexture(p.tex, p.color);
        mat.specularColor = new BABYLON.Color3(0.04, 0.04, 0.04);
        mat.emissiveColor = new BABYLON.Color3(0.06, 0.06, 0.07); // mínimo para no perder color en el lado oscuro
        mesh.material = mat;

        // --- atmósfera (esfera ligeramente mayor, emisiva semitransparente) ---
        if (p.atm) {
          const atm = BABYLON.MeshBuilder.CreateSphere("atm_" + p.name, { diameter: 2.12, segments: 24 }, scene);
          atm.parent = mesh;
          const am = new BABYLON.StandardMaterial("atmMat_" + p.name, scene);
          const ac = hexToRgb(p.atm);
          am.emissiveColor = new BABYLON.Color3(ac.r / 255, ac.g / 255, ac.b / 255);
          am.diffuseColor = new BABYLON.Color3(0, 0, 0);
          am.specularColor = new BABYLON.Color3(0, 0, 0);
          am.alpha = 0.22;
          am.backFaceCulling = false;
          atm.material = am;
        }

        // --- anillos de Saturno (torus plano) ---
        if (p.rings) createSaturnRings(mesh, p.rings, p.size);

        // --- etiqueta flotante (billboard) ---
        const labelPlane = BABYLON.MeshBuilder.CreatePlane("lbl_" + p.name, { width: 6, height: 1.5 }, scene);
        labelPlane.parent = mesh;
        labelPlane.position.y = 1.0 + 1.2; // encima del planeta (coords locales del radio unitario)
        labelPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        const lm = new BABYLON.StandardMaterial("lblMat_" + p.name, scene);
        lm.diffuseTexture = makeLabelTexture(p.name);
        lm.emissiveTexture = lm.diffuseTexture;
        lm.disableLighting = true;
        lm.useAlphaFromDiffuseTexture = true;
        lm.backFaceCulling = false;
        labelPlane.material = lm;
        labels.push(labelPlane);

        // estado orbital inicial
        p.angle = Math.random() * Math.PI * 2;
        p.angularSpeed = ORBITAL_K / p.distance; // Kepler simplificado: v ∝ 1/distancia
        p.mesh = mesh;
        p.cosIncl = Math.cos(p.incl);
        p.sinIncl = Math.sin(p.incl);
        planetMeshes.push(mesh);
        if (p.name === "Tierra") earthMesh = mesh;
        if (p.name === "Saturno") saturnMesh = mesh;

        // --- órbita elíptica estática (Sol en el foco) ---
        const pts = [];
        const N = 128;
        for (let i = 0; i <= N; i++) {
          const th = (i / N) * Math.PI * 2;
          const ep = ellipsePoint(p.distance, p.ecc, th);
          // inclinación orbital: rotación alrededor del eje X
          pts.push(new BABYLON.Vector3(ep.x, -ep.z * p.sinIncl, ep.z * p.cosIncl));
        }
        const line = BABYLON.MeshBuilder.CreateLines("orbit_" + p.name, { points: pts, updatable: false }, scene);
        line.color = new BABYLON.Color3(0.35, 0.45, 0.7);
        line.alpha = 0.35;
        line.isPickable = false;
        orbits.push(line);
      });
    }

    /* -----------------------------------------------------------------
       11) createSaturnRings — torus alrededor del planeta
       ----------------------------------------------------------------- */
    function createSaturnRings(parent, hexColor, planetSize) {
      const ring = BABYLON.MeshBuilder.CreateTorus("saturnRings", {
        diameter: planetSize * 4.4, thickness: planetSize * 0.55, tessellation: 64
      }, scene);
      ring.parent = parent;
      const rm = new BABYLON.StandardMaterial("ringMat", scene);
      const c = hexToRgb(hexColor);
      rm.diffuseColor = new BABYLON.Color3(c.r / 255, c.g / 255, c.b / 255);
      rm.emissiveColor = new BABYLON.Color3(c.r / 510, c.g / 510, c.b / 510);
      rm.alpha = 0.75;
      rm.backFaceCulling = false;
      rm.specularColor = new BABYLON.Color3(0, 0, 0);
      ring.material = rm;
      return ring;
    }

    /* -----------------------------------------------------------------
       10) createAsteroidBelt — 220+ instancias (rendimiento)
       ----------------------------------------------------------------- */
    function createAsteroidBelt() {
      const COUNT = 220;
      // Malla fuente: una vez renderizada, las instancias comparten su geometría
      const base = BABYLON.MeshBuilder.CreateSphere("asteroidBase", { diameter: 0.5, segments: 6 }, scene);
      const bm = new BABYLON.StandardMaterial("asteroidMat", scene);
      bm.diffuseColor = new BABYLON.Color3(0.45, 0.4, 0.35);
      bm.specularColor = new BABYLON.Color3(0.02, 0.02, 0.02);
      base.material = bm;
      asteroids.push(base);

      for (let i = 0; i < COUNT; i++) {
        const r = 50 + Math.random() * 10;        // entre Marte y Júpiter
        const th = Math.random() * Math.PI * 2;
        const y = (Math.random() - 0.5) * 2.5;
        const inst = base.createInstance("ast_" + i);
        inst.position.set(r * Math.cos(th), y, r * Math.sin(th));
        const s = 0.3 + Math.random() * 1.1;
        inst.scaling.set(s, s, s);
        inst.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
        inst._spin = (Math.random() - 0.5) * 1.5; // velocidad de rotación propia
        inst._orbit = th;
        inst._radius = r;
        inst._y = y;
        inst._orbitSpeed = 0.04 + Math.random() * 0.05;
        asteroids.push(inst);
      }
    }

    /* -----------------------------------------------------------------
       12) createHalley — órbita muy excéntrica + cola direccional
       ----------------------------------------------------------------- */
    function createHalley() {
      // Parámetros orbitales del cometa (e exagerado visualmente a 0.85)
      const A = 80, E = 0.85;
      const B = A * Math.sqrt(1 - E * E);
      const PERIOD = 18;   // segundos por vuelta
      halleyNucleus = BABYLON.MeshBuilder.CreateSphere("halley", { diameter: 1.4, segments: 16 }, scene);
      const hm = new BABYLON.StandardMaterial("halleyMat", scene);
      hm.emissiveColor = new BABYLON.Color3(0.8, 0.9, 1.0);
      hm.disableLighting = true;
      halleyNucleus.material = hm;

      // Cola (ParticleSystem) — la dirección se recalcula cada frame (render loop)
      halleyTail = new BABYLON.ParticleSystem("halleyTail", 1500, scene);
      halleyTail.particleTexture = FLARE_TEX;
      halleyTail.emitter = halleyNucleus;
      halleyTail.minEmitBox = new BABYLON.Vector3(0, 0, 0);
      halleyTail.maxEmitBox = new BABYLON.Vector3(0, 0, 0);
      // Blanco cerca del núcleo → cian al final → transparente
      halleyTail.addColorGradient(0.0, new BABYLON.Color4(1, 1, 1, 1));
      halleyTail.addColorGradient(0.4, new BABYLON.Color4(0.6, 0.85, 1, 0.8));
      halleyTail.addColorGradient(1.0, new BABYLON.Color4(0.3, 0.6, 1, 0));
      halleyTail.addSizeGradient(0.0, 1.2);
      halleyTail.addSizeGradient(1.0, 0.2);
      halleyTail.minLifeTime = 1.0; halleyTail.maxLifeTime = 2.2;
      halleyTail.emitRate = 1200;
      halleyTail.minEmitPower = 1.5; halleyTail.maxEmitPower = 3.5;
      halleyTail.gravity = BABYLON.Vector3.Zero();
      halleyTail.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
      halleyTail.direction1 = new BABYLON.Vector3(1, 0, 0); // se sobrescribe cada frame
      halleyTail.direction2 = new BABYLON.Vector3(1, 0, 0);
      halleyTail.start();

      // Órbita elíptica visible (Sol en el foco)
      const pts = [];
      const N = 256;
      for (let i = 0; i <= N; i++) {
        const th = (i / N) * Math.PI * 2;
        const x = A * Math.cos(th) - A * E;
        const z = B * Math.sin(th);
        // leve inclinación de la órbita del cometa
        pts.push(new BABYLON.Vector3(x, -z * 0.25, z * 0.97));
      }
      halleyOrbit = BABYLON.MeshBuilder.CreateLines("halleyOrbit", { points: pts }, scene);
      halleyOrbit.color = new BABYLON.Color3(0.6, 0.8, 1);
      halleyOrbit.alpha = 0.25;
      halleyOrbit.isPickable = false;
      orbits.push(halleyOrbit);

      // estado
      halleyNucleus._A = A; halleyNucleus._E = E; halleyNucleus._B = B;
      halleyNucleus._phase = 0;
      halleyNucleus._period = PERIOD;
    }

    /* -----------------------------------------------------------------
       13) createNebulas — planos con DynamicTexture (billboard)
       ----------------------------------------------------------------- */
    function createNebulas() {
      const palettes = [
        ["#ff4fa3", "#7a1fff"],
        ["#7a3cff", "#1f4fff"],
        ["#ff5a3c", "#ff2fa3"],
        ["#3cffd0", "#1f6fff"],
        ["#b03cff", "#ff4fa3"]
      ];
      const positions = [
        [-1400, 200, -900], [1300, -300, -1100], [-900, 500, 1300],
        [1100, 400, 1200], [-1300, -400, 1100]
      ];
      positions.forEach(function (pos, i) {
        const pal = palettes[i % palettes.length];
        const plane = BABYLON.MeshBuilder.CreatePlane("neb_" + i, { width: 500, height: 500 }, scene);
        plane.position.set(pos[0], pos[1], pos[2]);
        plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        const m = new BABYLON.StandardMaterial("nebMat_" + i, scene);
        m.diffuseTexture = makeNebulaTexture(pal[0], pal[1]);
        m.emissiveTexture = m.diffuseTexture;
        m.disableLighting = true;
        m.useAlphaFromDiffuseTexture = true;
        m.backFaceCulling = false;
        m.alpha = 0.6;
        plane.material = m;
        plane.isPickable = false;
        nebulas.push(plane);
      });
    }

    /* -----------------------------------------------------------------
       14) setupPostProcessing — DefaultRenderingPipeline + GlowLayer
       ----------------------------------------------------------------- */
    function setupPostProcessing() {
      try {
        pipeline = new BABYLON.DefaultRenderingPipeline("default", true, scene, [camera]);
        pipeline.bloomEnabled = true;
        pipeline.bloomThreshold = 0.35;
        pipeline.bloomWeight = 0.55;
        pipeline.bloomKernel = 64;
        pipeline.bloomScale = 0.5;
        pipeline.imageProcessingEnabled = true;
        pipeline.imageProcessing.toneMappingEnabled = true;
        pipeline.imageProcessing.vignetteEnabled = true;
        pipeline.imageProcessing.vignetteWeight = 0.5;
        pipeline.fxaaEnabled = true;
      } catch (e) {
        // Degradación elegante: sin pipeline, la escena sigue funcionando
        pipeline = null;
        console.warn("Post-procesado no disponible:", e && e.message);
      }
      try {
        glowLayer = new BABYLON.GlowLayer("glow", scene);
        glowLayer.intensity = 0.75;
      } catch (e) {
        glowLayer = null;
        console.warn("GlowLayer no disponible:", e && e.message);
      }
    }

    /* -----------------------------------------------------------------
       CONSTRUCCIÓN DE LA ESCENA (orden del spec)
       ----------------------------------------------------------------- */
    createStars();
    createSun();
    createPlanets();
    createAsteroidBelt();
    createHalley();
    createNebulas();
    setupPostProcessing();

    /* -----------------------------------------------------------------
       15) setupUI — listeners de todos los controles
       ----------------------------------------------------------------- */
    function setupUI() {
      const $ = (id) => document.getElementById(id);

      $('globalSpeed').addEventListener('input', (e) => {
        state.globalSpeed = parseFloat(e.target.value);
        $('globalSpeedVal').textContent = state.globalSpeed.toFixed(1) + '×';
      });
      $('orbitalMult').addEventListener('input', (e) => {
        state.orbitalMult = parseFloat(e.target.value);
        $('orbitalMultVal').textContent = state.orbitalMult.toFixed(1) + '×';
      });
      $('pauseBtn').addEventListener('click', () => {
        state.paused = !state.paused;
        $('pauseBtn').textContent = state.paused ? '▶ Reanudar' : '⏸ Pausar';
      });

      $('showOrbits').addEventListener('change', (e) => {
        state.showOrbits = e.target.checked;
        orbits.forEach((o) => o.isVisible = state.showOrbits);
      });
      $('showNames').addEventListener('change', (e) => {
        state.showNames = e.target.checked;
        labels.forEach((l) => l.isVisible = state.showNames);
      });
      $('showHalley').addEventListener('change', (e) => {
        state.showHalley = e.target.checked;
        if (halleyNucleus) halleyNucleus.isVisible = state.showHalley;
        if (halleyOrbit) halleyOrbit.isVisible = state.showHalley && state.showOrbits;
      });
      $('showTail').addEventListener('change', (e) => {
        state.showTail = e.target.checked;
        if (!halleyTail) return;
        if (state.showTail) halleyTail.start(); else halleyTail.stop();
      });
      $('showAsteroids').addEventListener('change', (e) => {
        state.showAsteroids = e.target.checked;
        asteroids.forEach((a) => a.isVisible = state.showAsteroids);
      });
      $('showNebulas').addEventListener('change', (e) => {
        state.showNebulas = e.target.checked;
        nebulas.forEach((n) => n.isVisible = state.showNebulas);
      });

      $('cameraView').addEventListener('change', (e) => { state.cameraMode = e.target.value; });
      $('sizeScale').addEventListener('input', (e) => {
        state.sizeScale = parseFloat(e.target.value);
        $('sizeScaleVal').textContent = state.sizeScale.toFixed(1) + '×';
        planetMeshes.forEach((m) => m.scaling.set(
          m.userData_baseSize * state.sizeScale, m.userData_baseSize * state.sizeScale, m.userData_baseSize * state.sizeScale
        ));
      });
      // Guardamos el tamaño base de cada planeta para el escalado relativo
      PLANETS.forEach((p) => { p.mesh.userData_baseSize = p.size; });

      $('theme').addEventListener('change', (e) => {
        document.body.classList.remove('theme-futurista', 'theme-clasico', 'theme-oscuro');
        document.body.classList.add('theme-' + e.target.value);
        if (e.target.value === 'oscuro') scene.clearColor = new BABYLON.Color4(0.048, 0.06, 0.12, 1);
        else if (e.target.value === 'clasico') scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);
        else scene.clearColor = new BABYLON.Color4(0.02, 0.025, 0.05, 1);
      });

      $('bloomToggle').addEventListener('change', (e) => {
        state.bloom = e.target.checked;
        if (pipeline) { pipeline.bloomEnabled = state.bloom; pipeline.imageProcessingEnabled = state.bloom; }
        if (glowLayer) glowLayer.intensity = state.bloom ? 0.75 : 0;
      });

      $('sunColor').addEventListener('change', (e) => {
        state.sunColor = e.target.value;
        applySunColor();
      });

      // Toggle del panel en móvil
      const panel = $('panel'), toggle = $('panelToggle');
      toggle.addEventListener('click', () => {
        panel.classList.toggle('collapsed');
        toggle.classList.toggle('visible');
      });
      function checkResponsive() {
        if (window.innerWidth <= 600) {
          panel.classList.add('collapsed');
          toggle.classList.add('visible');
        } else {
          panel.classList.remove('collapsed');
          toggle.classList.remove('visible');
        }
      }
      checkResponsive();
      window.addEventListener('resize', checkResponsive);
    }

    /** Aplica el color seleccionado al Sol (material, luz y corona fallback). */
    function applySunColor() {
      const sc = SUN_COLORS[state.sunColor];
      if (sunMesh && sunMesh.material) {
        sunMesh.material.emissiveColor = new BABYLON.Color3(sc.emissive[0], sc.emissive[1], sc.emissive[2]);
      }
      if (sunPointLight) {
        sunPointLight.diffuse = new BABYLON.Color3(sc.light[0], sc.light[1], sc.light[2]);
      }
      if (sunCorona && sunCorona.color1) {
        sunCorona.color1 = new BABYLON.Color4(sc.emissive[0], sc.emissive[1] * 0.6, sc.emissive[2] * 0.3, 1);
      }
    }

    setupUI();

    /* -----------------------------------------------------------------
       16) RENDER LOOP — animación basada en deltaTime
       ----------------------------------------------------------------- */
    let elapsed = 0;
    scene.onBeforeRenderObservable.add(function () {
      const dt = engine.getDeltaTime() / 1000; // segundos
      const speedFactor = state.paused ? 0 : dt * state.globalSpeed;
      elapsed += speedFactor;

      // --- Sol: rotación + pulso de escala ---
      if (sunMesh) {
        sunMesh.rotation.y += speedFactor * 0.25;
        const pulse = 1.0 + 0.025 * (Math.sin(elapsed * (2 * Math.PI / 3)));
        sunMesh.scaling.set(pulse, pulse, pulse);
      }

      // --- Planetas: órbita elíptica (Sol en foco) + rotación propia ---
      PLANETS.forEach(function (p) {
        p.angle += speedFactor * p.angularSpeed * state.orbitalMult;
        const ep = ellipsePoint(p.distance, p.ecc, p.angle);
        // inclinación orbital (rotación eje X)
        p.mesh.position.set(ep.x, -ep.z * p.sinIncl, ep.z * p.cosIncl);
        // rotación propia sobre eje inclinado (Venus retrógrada)
        const spin = speedFactor * 1.5 * (p.retro ? -1 : 1);
        p.mesh.rotation.y += spin;
      });

      // --- Asteroides: lenta deriva orbital + rotación propia ---
      if (state.showAsteroids) {
        for (let i = 1; i < asteroids.length; i++) {
          const a = asteroids[i];
          a._orbit += speedFactor * a._orbitSpeed * 0.5;
          a.position.set(a._radius * Math.cos(a._orbit), a._y, a._radius * Math.sin(a._orbit));
          a.rotation.y += speedFactor * a._spin;
        }
      }

      // --- Cometa Halley: órbita excéntrica + cola ALEJÁNDOSE del Sol ---
      if (halleyNucleus) {
        const h = halleyNucleus;
        if (state.showHalley) {
          h._phase += speedFactor * (2 * Math.PI / h._period);
          const x = h._A * Math.cos(h._phase) - h._A * h._E; // Sol en foco
          const z = h._B * Math.sin(h._phase);
          h.position.set(x, -z * 0.25, z * 0.97);

          // Cola: dirección AWAY from Sun  =>  vector (cometa − Sol)
          // Sol está en el origen, así que dir = normalize(position − 0)
          // Usamos la forma estática Normalize para NO mutar la posición del cometa.
          if (state.showTail && halleyTail) {
            const away = BABYLON.Vector3.Normalize(h.position); // nuevo Vector3, no muta h.position
            halleyTail.direction1 = away.scale(0.85);
            halleyTail.direction2 = away.scale(1.15);
          }
        }
      }

      // --- Vistas de cámara (seguir objetivo si corresponde) ---
      updateCameraView(dt);
    });

    /** Ajusta la cámara según el modo seleccionado. */
    function updateCameraView(dt) {
      switch (state.cameraMode) {
        case 'sun':
          camera.setTarget(BABYLON.Vector3.Zero());
          smoothRadius(40, dt);
          break;
        case 'earth':
          if (earthMesh) camera.setTarget(earthMesh.getAbsolutePosition());
          smoothRadius(12, dt);
          break;
        case 'saturn':
          if (saturnMesh) camera.setTarget(saturnMesh.getAbsolutePosition());
          smoothRadius(28, dt);
          break;
        case 'pano':
          camera.setTarget(BABYLON.Vector3.Zero());
          smoothRadius(600, dt);
          break;
        case 'halley':
          if (halleyNucleus && halleyNucleus.isVisible) camera.setTarget(halleyNucleus.getAbsolutePosition());
          smoothRadius(20, dt);
          break;
        case 'system':
        default:
          camera.setTarget(BABYLON.Vector3.Zero());
          smoothRadius(180, dt);
          break;
      }
    }
    function smoothRadius(target, dt) {
      const k = 1 - Math.exp(-dt * 3); // suavizado exponencial
      camera.radius += (target - camera.radius) * Math.min(1, k);
    }

    /* -----------------------------------------------------------------
       17) runRenderLoop + resize + panel de info
       ----------------------------------------------------------------- */
    engine.runRenderLoop(function () { scene.render(); });
    window.addEventListener('resize', function () { engine.resize(); });

    // FPS y conteo de objetos (actualización a 4 Hz para no recargar la UI)
    const fpsEl = document.getElementById('fps');
    const objEl = document.getElementById('objCount');
    setInterval(function () {
      fpsEl.textContent = engine.getFps().toFixed(0);
      objEl.textContent = scene.meshes.length;
    }, 250);

    // Ocultar loader al primer render
    scene.executeWhenReady(function () {
      const loader = document.getElementById('loader');
      loader.classList.add('hide');
      setTimeout(() => { loader.style.display = 'none'; }, 700);
    });

  })();
  </script>
</body>
