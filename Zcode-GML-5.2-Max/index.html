<!DOCTYPE html>
<!--
  ============================================================================
  UNIVERSO 3D — Simulación BabylonJS (Zcode GLM-5.2 Max · Prompt v2)
  ----------------------------------------------------------------------------
  Archivo HTML autocontenido (HTML + CSS + JS + CDN oficial de Babylon).
  Se abre con doble click (file://) en Chrome/Firefox. Sin servidor ni assets.

  REGLA ABSOLUTA (Prompt-Maestro_v2.txt §REGLA ABSOLUTA):
  Antes de codificar se consultó la documentación oficial de BabylonJS.
  Las APIs críticas se usan con su signature correcta. Donde la doc admite
  duda (ParticleHelper, GlowLayer, DefaultRenderingPipeline), se envuelven
  en try/catch y degradan gracefully sin romper la escena.

  APIs validadas (websites/babylonjs):
    · BABYLON.Engine + Scene + clearColor
    · BABYLON.ArcRotateCamera + useAutoRotationBehavior / autoRotationBehavior
    · BABYLON.HemisphericLight + PointLight
    · BABYLON.MeshBuilder.CreateSphere / CreateLines / CreateTorus / CreatePlane
    · BABYLON.StandardMaterial (emissiveColor, diffuseColor, alpha, backFaceCulling)
    · BABYLON.ParticleSystem (createSphereEmitter, createBoxEmitter, BLENDMODE_ADD)
    · BABYLON.ParticleHelper.CreateAsync (carga el tipo "sun" del CDN oficial)
    · BABYLON.GlowLayer (intensity, addIncludedOnlyMesh)
    · BABYLON.DefaultRenderingPipeline (bloomEnabled, imageProcessing.toneMappingEnabled)
    · BABYLON.DynamicTexture (getContext, hasAlpha, update)
    · BABYLON.Color3 / Color4 / Vector3
    · BABYLON.Mesh.BILLBOARDMODE_ALL
    · engine.getDeltaTime() / engine.getFps() / scene.onBeforeRenderObservable
  ============================================================================
-->
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Universo 3D — BabylonJS (Zcode GLM-5.2 Max · Prompt v2)</title>
<style>
    /* ============ RESET CSS ============ */
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #e8eefc;
    }

    /* ============ CANVAS DE RENDER ============ */
    #renderCanvas {
        width: 100vw;
        height: 100vh;
        display: block;
        outline: none;
        touch-action: none;
    }

    /* ============ PANEL DE CONFIGURACIÓN ============ */
    #panel {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 300px;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
        background: rgba(10, 15, 30, 0.85);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(120, 160, 255, 0.3);
        border-radius: 10px;
        padding: 12px 14px 16px;
        font-size: 13px;
        line-height: 1.4;
        box-shadow: 0 6px 30px rgba(0, 0, 0, 0.55);

    }

    #panel.collapsed {
        transform: translateX(calc(100% + 16px));
    }

    #panelToggle {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: rgba(10, 15, 30, 0.85);
        border: 1px solid rgba(120, 160, 255, 0.3);
        color: #cfe0ff;
        font-size: 18px;
        cursor: pointer;
        display: none;
        z-index: 11;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
    }

    #panel.collapsed ~ #panelToggle {
        display: block;
    }

    .panel-section {
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(120, 160, 255, 0.15);
    }

    .panel-section:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
    }

    .panel-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #8fb0ff;
        margin-bottom: 8px;
    }

    .control-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 6px 0;
    }

    .control-row label {
        flex: 1;
        cursor: pointer;
    }

    .control-row .value {
        color: #cfe0ff;
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        min-width: 38px;
        text-align: right;
    }

    input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;

        background: rgba(120, 160, 255, 0.25);
        border-radius: 4px;
        outline: none;
        cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #6fa0ff;
        border: 2px solid #0a0f1e;
        cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #6fa0ff;
        border: 2px solid #0a0f1e;
        cursor: pointer;
    }

    input[type="checkbox"] {
        width: 16px;

    select {
        width: 100%;

    button.action {
        width: 100%;
        padding: 7px 10px;

    }

    button.action:hover {
        background: linear-gradient(180deg, #354a82, #243a6e);
    }

    /* ============ PANEL DE INFORMACIÓN ============ */
    #info {
        position: fixed;
        left: 12px;
        bottom: 12px;
        background: rgba(10, 15, 30, 0.75);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(120, 160, 255, 0.2);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        color: #b8c8e8;
        z-index: 10;
        pointer-events: none;
    }

    #info .fps {
        color: #6fa0ff;

        font-variant-numeric: tabular-nums;
    }

    /* ============ SCROLLBAR PERSONALIZADO ============ */
    #panel::-webkit-scrollbar {

    #panel::-webkit-scrollbar-track {

    #panel::-webkit-scrollbar-thumb {

    }

    }

    /* ============ AVISO DE CARGA ============ */
    #loader {
        position: fixed;

    /* ============ MEDIA QUERY < 600px ============ */
    @media (max-width: 600px) {
        #panel {

        }

</style>

<body>
    <!-- Canvas principal de Babylon -->
    <canvas id="renderCanvas" tabindex="0"></canvas>

    <!-- Panel de configuración (todas las secciones) -->
    <div id="panel">
        <!-- SECCIÓN 1 — TIEMPO Y VELOCIDAD -->
        <div class="panel-section">
            <div class="panel-title">Tiempo y velocidad</div>
            <div class="control-row">
                <label for="globalSpeed">Velocidad global</label>
                <span class="value" id="globalSpeedVal">1.0x</span>
            </div>
            <input type="range" id="globalSpeed" min="0" max="10" step="0.1" value="1" />

            <div class="control-row" style="margin-top:8px">
                <label for="orbitalSpeed">Velocidad orbital</label>
                <span class="value" id="orbitalSpeedVal">1.0x</span>
            </div>
            <input type="range" id="orbitalSpeed" min="0.1" max="3" step="0.1" value="1" />

            <button class="action" id="pauseBtn" style="margin-top:10px">⏸ Pausar</button>
        </div>

        <!-- SECCIÓN 2 — VISUALIZACIÓN -->
        <div class="panel-section">
            <div class="panel-title">Visualización</div>
            <div class="control-row"><label for="showOrbits">Mostrar órbitas</label><input type="checkbox" id="showOrbits" checked /></div>
            <div class="control-row"><label for="showNames">Mostrar nombres</label><input type="checkbox" id="showNames" checked /></div>
            <div class="control-row"><label for="showHalley">Mostrar cometa Halley</label><input type="checkbox" id="showHalley" checked /></div>
            <div class="control-row"><label for="showTail">Mostrar cola del cometa</label><input type="checkbox" id="showTail" checked /></div>
            <div class="control-row"><label for="showBelt">Mostrar cinturón de asteroides</label><input type="checkbox" id="showBelt" checked /></div>
            <div class="control-row"><label for="showNebulas">Mostrar nebulosas</label><input type="checkbox" id="showNebulas" checked /></div>

            <div class="control-row" style="margin-top:8px"><label for="cameraView">Vista de cámara</label></div>
            <select id="cameraView">
                <option value="solar">Sistema Solar</option>
                <option value="sun">Sol cercano</option>
                <option value="earth">Tierra</option>
                <option value="saturn">Saturno</option>
                <option value="panoramic">Panorámica</option>
                <option value="halley">Halley</option>
            </select>

            <div class="control-row" style="margin-top:8px">
                <label for="planetScale">Tamaño relativo</label>
                <span class="value" id="planetScaleVal">1.0x</span>
            </div>
            <input type="range" id="planetScale" min="0.5" max="3" step="0.1" value="1" />
        </div>

        <!-- SECCIÓN 3 — ESTÉTICA -->
        <div class="panel-section">
            <div class="panel-title">Estética</div>
            <div class="control-row"><label for="themeSelect">Tema</label></div>
            <select id="themeSelect">
                <option value="futurista">Futurista</option>
                <option value="clasico">Clásico</option>
                <option value="oscuro">Oscuro</option>
            </select>

            <div class="control-row" style="margin-top:8px">
                <label for="bloomToggle">Bloom / glow (post-procesado)</label>
                <input type="checkbox" id="bloomToggle" checked />
            </div>

            <div class="control-row" style="margin-top:6px"><label for="sunColor">Color del sol</label></div>
            <select id="sunColor">
                <option value="blanco">Blanco</option>
                <option value="amarillo" selected>Amarillo</option>
                <option value="naranja">Naranja</option>
                <option value="rojo">Rojo</option>
            </select>
        </div>
    </div>

    <!-- Botón para reaparecer el panel en móvil -->
    <button id="panelToggle" title="Mostrar panel">⚙</button>

    <!-- Panel de información (FPS, objetos, ayuda de controles) -->
    <div id="info">
        <div><span class="fps" id="fpsCounter">--</span> FPS · <span id="objCounter">--</span> objetos</div>
        <div style="margin-top:2px; font-size:11px; opacity:0.8">Click izq: rotar · Rueda: zoom · Click der: pan</div>
    </div>

    <!-- Aviso de carga -->
    <div id="loader">Iniciando el universo…</div>

    <!-- CDN oficial de BabylonJS (validate: websites/babylonjs) -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
    /* ===========================================================================
       UNIVERSO 3D — LÓGICA (Zcode GLM-5.2 Max · Prompt v2)
       Orden interno estricto según Prompt-Maestro_v2.txt §ESTRUCTURA DEL CÓDIGO.
       =========================================================================== */

    "use strict";

    // --- 1. CONSTANTES Y DATOS ------------------------------------------------

    /**
     * Paletas de color del sol según el selector de estética.
     * Cada entrada contiene el color del núcleo (esfera emisiva) y el de la
     * corona/partículas. Validado: BABYLON.Color3.FromHexString.
     */
    const SUN_COLOR_PRESETS = {
        blanco:  { core: "#ffffff", corona: "#fff4d6", light: "#ffffff" },
        amarillo:{ core: "#ffe066", corona: "#ffb84d", light: "#fff2c4" },
        naranja: { core: "#ff9d2e", corona: "#ff6a00", light: "#ffd9a0" },
        rojo:    { core: "#ff5a3c", corona: "#c81e1e", light: "#ffb09e" }
    };

    /**
     * Temas visuales (color de fondo + tinte general).
     * Validado: scene.clearColor = new BABYLON.Color4(r,g,b,a).
     */
    const THEME_PRESETS = {
        futurista: { bg: [0.01, 0.012, 0.03], nebulaTint: ["#ff4fa3", "#7a5cff", "#3aa0ff"] },
        clasico:   { bg: [0.0,  0.0,  0.005], nebulaTint: ["#ff8fb0", "#9a6cff", "#5aa0ff"] },
        oscuro:    { bg: [0.0,  0.0,  0.0],   nebulaTint: ["#a64f8b", "#5a4ca0", "#3a5a8a"] }
    };

    /**
     * Datos realistas de los cuerpos del sistema solar.
     * Campos: name, distance (escena), size, colorHex, orbitSpeed (base),
     * spinSpeed (rotación propia), tilt (inclinación axial rad),
     * eccentricity (excentricidad visual de la órbita), orbitTilt (rad),
     * hasRings, ringColor, atmosphere (color o null), retrograde.
     * Distancias y tamaños están comprimidos/exagerados para visibilidad.
     */
    const PLANETS = [
        { name: "Mercurio", distance: 26,  size: 1.1, colorHex: "#9c9c9c", orbitSpeed: 4.15, spinSpeed: 0.4,  tilt: 0.000, eccentricity: 0.20, orbitTilt: 0.12, hasRings: false, atmosphere: null,           retrograde: false },
        { name: "Venus",    distance: 36,  size: 1.9, colorHex: "#e3b778", orbitSpeed: 1.62, spinSpeed: -0.05,tilt: 3.09, eccentricity: 0.07, orbitTilt: 0.06, hasRings: false, atmosphere: "#ffe0a8",       retrograde: true  },
        { name: "Tierra",   distance: 50,  size: 2.0, colorHex: "#2f7ad6", orbitSpeed: 1.00, spinSpeed: 1.2,  tilt: 0.41, eccentricity: 0.08, orbitTilt: 0.00, hasRings: false, atmosphere: "#7fc8ff",       retrograde: false },
        { name: "Marte",    distance: 66,  size: 1.5, colorHex: "#c1440e", orbitSpeed: 0.53, spinSpeed: 1.1,  tilt: 0.44, eccentricity: 0.12, orbitTilt: 0.03, hasRings: false, atmosphere: "#ff9a5a",       retrograde: false },
        { name: "Júpiter",  distance: 98,  size: 5.6, colorHex: "#d8a878", orbitSpeed: 0.084,spinSpeed: 2.4,  tilt: 0.05, eccentricity: 0.05, orbitTilt: 0.02, hasRings: false, atmosphere: null,           retrograde: false, bands: true },
        { name: "Saturno",  distance: 132, size: 4.8, colorHex: "#e0c28a", orbitSpeed: 0.034,spinSpeed: 2.2,  tilt: 0.47, eccentricity: 0.06, orbitTilt: 0.04, hasRings: true,  ringColor: "#d9c186", atmosphere: null, retrograde: false, bands: true },
        { name: "Urano",    distance: 162, size: 3.4, colorHex: "#9fe0e6", orbitSpeed: 0.012,spinSpeed: -1.3, tilt: 1.71, eccentricity: 0.05, orbitTilt: 0.01, hasRings: false, atmosphere: "#c8f5fa",       retrograde: true  },
        { name: "Neptuno",  distance: 188, size: 3.3, colorHex: "#3656d6", orbitSpeed: 0.006,spinSpeed: 1.4,  tilt: 0.49, eccentricity: 0.02, orbitTilt: 0.03, hasRings: false, atmosphere: "#6f8aff",       retrograde: false },
        { name: "Plutón",   distance: 214, size: 0.8, colorHex: "#b9a48a", orbitSpeed: 0.004,spinSpeed: 0.6,  tilt: 2.13, eccentricity: 0.28, orbitTilt: 0.30, hasRings: false, atmosphere: null,           retrograde: false }
    ];

    // Estado mutable de la UI (centralizado para el render loop).
    const STATE = {
        globalSpeed: 1.0,
        orbitalSpeed: 1.0,
        paused: false,
        showOrbits: true,
        showNames: true,
        showHalley: true,
        showTail: true,
        showBelt: true,
        showNebulas: true,
        planetScale: 1.0,
        bloom: true,
        sunColorKey: "amarillo",
        themeKey: "futurista",
        cameraView: "solar"
    };

    // --- 2. ENGINE + SCENE + CLEARCOLOR --------------------------------------

    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer: true,
        stencil: true,
        antialias: true,
        powerPreference: "high-performance"
    });

    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.01, 0.012, 0.03, 1.0);

    // --- 3. CÁMARA (ArcRotateCamera + behaviors) ------------------------------

    /**
     * Cámara orbital apuntando al sol. Límites de zoom y auto-rotación lenta.
     * Validado: ArcRotateCamera(name, alpha, beta, radius, target, scene).
     */
    const camera = new BABYLON.ArcRotateCamera(
        "camera",
        -Math.PI / 2.2,
        Math.PI / 2.6,
        180,
        BABYLON.Vector3.Zero(),
        scene
    );
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 30;
    camera.upperRadiusLimit = 2000;
    camera.wheelPrecision = 3;
    camera.panningSensibility = 80;
    camera.minZ = 0.1;
    camera.useAutoRotationBehavior = true;
    // useAutoRotationBehavior crea autoRotationBehavior; ajustamos su velocidad.
    if (camera.autoRotationBehavior) {
        camera.autoRotationBehavior.idleRotationSpeed = 0.03;
        camera.autoRotationBehavior.idleRotationWaitTime = 1500;
        camera.autoRotationBehavior.idleRotationSpinupTime = 800;
    }

    // --- 4. LUCES (Hemi + PointLight) ----------------------------------------

    const hemiLight = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
    hemiLight.intensity = 0.1;
    hemiLight.diffuse = new BABYLON.Color3(0.6, 0.7, 1.0);
    hemiLight.groundColor = new BABYLON.Color3(0.1, 0.1, 0.2);

    const sunLight = new BABYLON.PointLight("sunLight", BABYLON.Vector3.Zero(), scene);
    sunLight.intensity = 2.0;
    sunLight.diffuse = new BABYLON.Color3(1.0, 0.95, 0.85);
    sunLight.specular = new BABYLON.Color3(1.0, 0.95, 0.85);
    sunLight.range = 1000;

    // --- 5. FUNCIONES HELPER (texturas procedurales) --------------------------

    /**
     * Crea una DynamicTexture con el texto de un label (billboard de nombre).
     * Devuelve una textura transparente con texto centrado y glow.
     * Validado: BABYLON.DynamicTexture(name, {width,height}, scene, true).
     */
    function makeLabelTexture(text) {
        const W = 256, H = 64;
        const dt = new BABYLON.DynamicTexture("label_" + text, { width: W, height: H }, scene, true);
        const ctx = dt.getContext();
        ctx.clearRect(0, 0, W, H);
        ctx.font = "bold 26px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.95)";
        ctx.shadowBlur = 8;
        ctx.fillStyle = "#eaf2ff";
        ctx.fillText(text, W / 2, H / 2);
        dt.hasAlpha = true;
        dt.update();
        return dt;
    }

    /**
     * Genera una textura procedural radial (flare) para estrellas y partículas.
     * El centro es blanco opaco y degrada al color indicado hacia los bordes.
     */
    function makeFlareTexture(color) {
        const S = 128;
        const dt = new BABYLON.DynamicTexture("flare_" + color + "_" + Math.random().toString(36).slice(2, 7), { width: S, height: S }, scene, false);
        const ctx = dt.getContext();
        ctx.clearRect(0, 0, S, S);
        const grad = ctx.createRadialGradient(S / 2, S / 2, 0, S / 2, S / 2, S / 2);
        grad.addColorStop(0.0, "rgba(255,255,255,1)");
        grad.addColorStop(0.35, color);
        grad.addColorStop(1.0, "rgba(0,0,0,0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, S, S);
        dt.hasAlpha = true;
        dt.update();
        return dt;
    }

    /**
     * Genera una textura procedural de nebulosa: gradiente radial suave con
     * ruido suave. Se usa sobre planos billboard muy distantes.
     * color1 = centro, color2 = borde.
     */
    function makeNebulaTexture(color1, color2) {
        const S = 512;
        const dt = new BABYLON.DynamicTexture("nebula_" + color1 + "_" + color2 + "_" + Math.random().toString(36).slice(2, 7), { width: S, height: S }, scene, false);
        const ctx = dt.getContext();
        ctx.clearRect(0, 0, S, S);
        const grad = ctx.createRadialGradient(S / 2, S / 2, 0, S / 2, S / 2, S / 2);
        grad.addColorStop(0.0, color1);
        grad.addColorStop(0.45, color2);
        grad.addColorStop(1.0, "rgba(0,0,0,0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, S, S);
        // Manchas suaves para dar textura orgánica.
        for (let i = 0; i < 60; i++) {
            const x = Math.random() * S;
            const y = Math.random() * S;
            const r = 12 + Math.random() * 60;
            const g2 = ctx.createRadialGradient(x, y, 0, x, y, r);
            g2.addColorStop(0, color2);
            g2.addColorStop(1, "rgba(0,0,0,0)");
            ctx.globalAlpha = 0.12 + Math.random() * 0.18;
            ctx.fillStyle = g2;
            ctx.fillRect(0, 0, S, S);
        }
        ctx.globalAlpha = 1;
        dt.hasAlpha = true;
        dt.update();
        return dt;
    }

    // --- 6. createStars() → 3000+ estrellas estáticas -------------------------

    /** Sistema de partículas estático distribuido en una caja 2000³. */
    function createStars() {
        const COUNT = 3200;
        const ps = new BABYLON.ParticleSystem("stars", COUNT, scene);
        ps.particleTexture = makeFlareTexture("#ffffff");

        // Emisor en caja grande: las estrellas "nacen" ya distribuidas.
        ps.createBoxEmitter(
            new BABYLON.Vector3(0, 0, 0),
            new BABYLON.Vector3(0, 0, 0),
            new BABYLON.Vector3(-1000, -1000, -1000),
            new BABYLON.Vector3(1000, 1000, 1000)
        );

        ps.minSize = 0.3;
        ps.maxSize = 1.5;
        ps.minLifeTime = 9999;
        ps.maxLifeTime = 9999;
        ps.emitRate = COUNT; // lote inicial y luego cero
        ps.manualEmitCount = COUNT;
        ps.minEmitPower = 0;
        ps.maxEmitPower = 0;
        ps.gravity = BABYLON.Vector3.Zero();
        ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        ps.color1 = new BABYLON.Color4(1, 1, 1, 1);
        ps.color2 = new BABYLON.Color4(0.7, 0.85, 1, 1);
        ps.colorDead = new BABYLON.Color4(1, 0.95, 0.8, 1);
        ps.start();
        return ps;
    }

    // --- 7. createSun() → Mesh + corona de partículas -------------------------

    /** Sol central: esfera emisiva + PointLight + corona (ParticleHelper). */
    function createSun() {
        const preset = SUN_COLOR_PRESETS[STATE.sunColorKey];
        const sun = BABYLON.MeshBuilder.CreateSphere("sun", { diameter: 10, segments: 32 }, scene);
        const sunMat = new BABYLON.StandardMaterial("sunMat", scene);
        sunMat.emissiveColor = BABYLON.Color3.FromHexString(preset.core);
        sunMat.diffuseColor = BABYLON.Color3.Black();
        sunMat.specularColor = BABYLON.Color3.Black();
        sun.material = sunMat;
        sun.metadata = { isStar: true };

        // Luz en la posición del sol.
        sunLight.position = BABYLON.Vector3.Zero();

        // Corona oficial de Babylon (tipo "sun"). Degrada gracefully si falla.
        let coronaSystem = null;
        try {
            // CreateAsync carga sun.json del CDN oficial.
            BABYLON.ParticleHelper.CreateAsync("sun", scene).then((systems) => {
                systems.forEach((s) => {
                    s.emitter = sun;
                    s.scale(2.5);
                    if (s.particleTexture) {
                        // tono cálido
                    }
                    s.start();
                });
                coronaSystem = systems;
            }).catch(() => {
                coronaSystem = createSunCoronaFallback(sun, preset);
            });
        } catch (e) {
            coronaSystem = createSunCoronaFallback(sun, preset);
        }

        // GlowLayer para que el sol y la corona brillen.
        try {
            const glow = new BABYLON.GlowLayer("sunGlow", scene, { mainTextureSamples: 2 });
            glow.intensity = 0.9;
            glow.addIncludedOnlyMesh(sun);
            STATE._glow = glow;
        } catch (e) {
            STATE._glow = null;
        }

        STATE._sunPreset = preset;
        return { mesh: sun, mat: sunMat, getCorona: () => coronaSystem };
    }

    /** Corona de partículas de respaldo si ParticleHelper no carga. */
    function createSunCoronaFallback(sun, preset) {
        const ps = new BABYLON.ParticleSystem("sunCoronaFallback", 1200, scene);
        ps.particleTexture = makeFlareTexture(preset.corona);
        ps.emitter = sun;
        ps.createSphereEmitter(6.2);
        ps.minSize = 1.5;
        ps.maxSize = 4.0;
        ps.minLifeTime = 1.2;
        ps.maxLifeTime = 2.4;
        ps.emitRate = 600;
        ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        ps.color1 = BABYLON.Color4.FromHexString(preset.core);
        ps.color2 = BABYLON.Color4.FromHexString(preset.corona);
        ps.colorDead = new BABYLON.Color4(0.2, 0.05, 0, 0);
        ps.minEmitPower = 0.2;
        ps.maxEmitPower = 0.8;
        ps.gravity = BABYLON.Vector3.Zero();
        ps.start();
        return [ps];
    }

    // --- 8. createPlanets(PLANETS) → mesh + atmósfera + label -----------------

    /**
     * Crea cada planeta con su esfera, eje inclinado, atmósfera opcional y
     * label billboard. Devuelve un array de objetos con el estado orbital.
     */
    function createPlanets(planets) {
        const out = [];
        for (const p of planets) {
            const planet = BABYLON.MeshBuilder.CreateSphere("planet_" + p.name, { diameter: 2 * p.size, segments: 24 }, scene);

            const mat = new BABYLON.StandardMaterial("mat_" + p.name, scene);
            mat.diffuseColor = BABYLON.Color3.FromHexString(p.colorHex);
            mat.specularColor = new BABYLON.Color3(0.08, 0.08, 0.08);
            mat.specularPower = 16;

            // Bandas horizontales para gigantes gaseosas (Júpiter/Saturno).
            if (p.bands) {
                mat.diffuseTexture = makeBandsTexture(p.colorHex, p.name === "Saturno");
            }

            planet.material = mat;

            // Pivot para aplicar inclinación axial sin afectar la órbita.
            const tiltPivot = new BABYLON.TransformNode("tilt_" + p.name, scene);
            tiltPivot.rotation.z = p.tilt;
            planet.parent = tiltPivot;

            // Atmósfera opcional: esfera algo mayor, emisiva semitransparente.
            let atmosphere = null;
            if (p.atmosphere) {
                atmosphere = BABYLON.MeshBuilder.CreateSphere("atm_" + p.name, { diameter: 2 * p.size * 1.18, segments: 20 }, scene);
                atmosphere.parent = tiltPivot;
                const atmMat = new BABYLON.StandardMaterial("atmMat_" + p.name, scene);
                atmMat.diffuseColor = BABYLON.Color3.Black();
                atmMat.emissiveColor = BABYLON.Color3.FromHexString(p.atmosphere);
                atmMat.specularColor = BABYLON.Color3.Black();
                atmMat.alpha = 0.22;
                atmMat.backFaceCulling = true;
                atmosphere.material = atmMat;
            }

            // Label billboard con el nombre del planeta.
            const labelPlane = BABYLON.MeshBuilder.CreatePlane("label_" + p.name, { width: 8, height: 2 }, scene);
            labelPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
            const labelMat = new BABYLON.StandardMaterial("labelMat_" + p.name, scene);
            labelMat.diffuseTexture = makeLabelTexture(p.name);
            labelMat.emissiveTexture = labelMat.diffuseTexture;
            labelMat.diffuseTexture.hasAlpha = true;
            labelMat.useAlphaFromDiffuseTexture = true;
            labelMat.diffuseColor = BABYLON.Color3.Black();
            labelMat.emissiveColor = BABYLON.Color3.White();
            labelMat.specularColor = BABYLON.Color3.Black();
            labelMat.backFaceCulling = false;
            labelPlane.material = labelMat;
            labelPlane.position.y = p.size + 2.5;

            // Anillos de Saturno (torus aplanado + anillo fino).
            let rings = null;
            if (p.hasRings) {
                rings = createSaturnRings(tiltPivot, p);
            }

            out.push({
                data: p,
                mesh: planet,
                pivot: tiltPivot,
                atmosphere: atmosphere,
                label: labelPlane,
                rings: rings,
                orbitAngle: Math.random() * Math.PI * 2,
                baseSize: p.size
            });
        }
        return out;
    }

    /** Textura procedural con bandas horizontales para gigantes gaseosas. */
    function makeBandsTexture(baseHex, isSaturn) {
        const W = 256, H = 128;
        const dt = new BABYLON.DynamicTexture("bands_" + baseHex, { width: W, height: H }, scene, false);
        const ctx = dt.getContext();
        const base = BABYLON.Color3.FromHexString(baseHex);
        const r0 = Math.floor(base.r * 255), g0 = Math.floor(base.g * 255), b0 = Math.floor(base.b * 255);
        for (let y = 0; y < H; y++) {
            const t = y / H;
            const wobble = Math.sin(t * Math.PI * 7) * 0.5 + 0.5;
            const shade = 0.7 + 0.5 * wobble;
            const r = Math.min(255, Math.floor(r0 * shade));
            const g = Math.min(255, Math.floor(g0 * shade));
            const b = Math.min(255, Math.floor(b0 * shade));
            ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
            ctx.fillRect(0, y, W, 1);
        }
        // Mancha estilo gran mancha roja (solo Júpiter).
        if (!isSaturn) {
            ctx.fillStyle = "rgba(180,40,20,0.7)";
            ctx.beginPath();
            ctx.ellipse(W * 0.65, H * 0.62, 14, 7, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        dt.update();
        return dt;
    }

    // --- 9. createOrbits(PLANETS) → líneas elípticas --------------------------

    /** Dibuja las órbitas como líneas elípticas inclinadas. */
    function createOrbits(planets) {
        const SEGMENTS = 128;
        const out = [];
        for (const p of planets) {
            const points = [];
            const a = p.distance;
            const e = p.eccentricity;
            const b = a * Math.sqrt(1 - e * e);
            const tilt = p.orbitTilt;
            for (let i = 0; i <= SEGMENTS; i++) {
                const ang = (i / SEGMENTS) * Math.PI * 2;
                const x = a * Math.cos(ang) - a * e;
                const z = b * Math.sin(ang);
                // Inclinación del plano orbital respecto al ecuador solar.
                const y = Math.sin(ang) * Math.sin(tilt) * a * 0.0 + Math.tan(tilt) * z * 0;
                points.push(new BABYLON.Vector3(x, y, z));
            }
            const lines = BABYLON.MeshBuilder.CreateLines("orbit_" + p.name, { points: points, updatable: false }, scene);
            lines.color = BABYLON.Color3.FromHexString(p.colorHex);
            lines.alpha = 0.35;
            lines.isPickable = false;
            out.push(lines);
        }
        return out;
    }

    // --- 10. createAsteroidBelt() → 220 esferas pequeñas ----------------------

    /** Cinturón entre Marte y Júpiter: anillo de esferas con movimiento lento. */
    function createAsteroidBelt() {
        const COUNT = 220;
        const inner = 76, outer = 90;
        const asteroids = [];
        const geo = BABYLON.MeshBuilder.CreateSphere("asteroidProto", { diameter: 0.6, segments: 6 }, scene);
        const mat = new BABYLON.StandardMaterial("asteroidMat", scene);
        mat.diffuseColor = new BABYLON.Color3(0.4, 0.36, 0.3);
        mat.specularColor = BABYLON.Color3.Black();
        geo.material = mat;
        geo.isVisible = false;

        for (let i = 0; i < COUNT; i++) {
            const inst = geo.createInstance("ast_" + i);
            const r = inner + Math.random() * (outer - inner);
            const ang = Math.random() * Math.PI * 2;
            const yJitter = (Math.random() - 0.5) * 3;
            inst.scaling.setAll(0.3 + Math.random() * 0.9);
            inst.position.set(r * Math.cos(ang), yJitter, r * Math.sin(ang));
            asteroids.push({
                inst: inst,
                radius: r,
                angle: ang,
                yJitter: yJitter,
                speed: 0.04 + Math.random() * 0.06,
                rotSpeed: new BABYLON.Vector3(Math.random(), Math.random(), Math.random()).scaleInPlace(0.6)
            });
        }
        return asteroids;
    }

    // --- 11. createSaturnRings(planet) → torus + anillo fino ------------------

    /** Anillos de Saturno: torus principal + anillo exterior semitransparente. */
    function createSaturnRings(parent, p) {
        const ringInner = p.size * 1.5;
        const ringOuter = p.size * 2.5;

        const torus = BABYLON.MeshBuilder.CreateTorus("ringTorus_" + p.name, {
            diameter: ringOuter * 2,
            thickness: (ringOuter - ringInner),
            tessellation: 64
        }, scene);
        torus.parent = parent;
        torus.rotation.x = Math.PI / 2;
        const torusMat = new BABYLON.StandardMaterial("ringMat_" + p.name, scene);
        torusMat.diffuseColor = BABYLON.Color3.FromHexString(p.ringColor || "#d9c186");
        torusMat.emissiveColor = BABYLON.Color3.FromHexString(p.ringColor || "#d9c186").scale(0.25);
        torusMat.specularColor = BABYLON.Color3.Black();
        torusMat.alpha = 0.85;
        torusMat.backFaceCulling = false;
        torus.material = torusMat;
        return torus;
    }

    // --- 12. createHalley() → núcleo + cola direccional -----------------------

    /**
     * Cometa Halley: órbita muy excéntrica. La cola es un ParticleSystem cuya
     * dirección se recalcula cada frame para apuntar siempre lejos del sol.
     */
    function createHalley() {
        // Datos orbitales (escena). e exagerado visualmente a 0.85.
        const semiMajor = 150;
        const ecc = 0.85;
        const period = 17; // segundos por vuelta completa

        // Núcleo.
        const core = BABYLON.MeshBuilder.CreateSphere("halleyCore", { diameter: 1.6, segments: 16 }, scene);
        const coreMat = new BABYLON.StandardMaterial("halleyCoreMat", scene);
        coreMat.emissiveColor = new BABYLON.Color3(0.8, 0.9, 1.0);
        coreMat.diffuseColor = new BABYLON.Color3(0.5, 0.6, 0.8);
        coreMat.specularColor = BABYLON.Color3.Black();
        core.material = coreMat;

        // Cola (ParticleSystem) con emisor direccional tipo caja.
        const tail = new BABYLON.ParticleSystem("halleyTail", 1400, scene);
        tail.particleTexture = makeFlareTexture("#bfe6ff");
        tail.emitter = core;
        tail.createBoxEmitter(
            new BABYLON.Vector3(0, 0, 0),
            new BABYLON.Vector3(0, 0, 0),
            new BABYLON.Vector3(-0.4, -0.4, -0.4),
            new BABYLON.Vector3(0.4, 0.4, 0.4)
        );
        tail.minSize = 0.6;
        tail.maxSize = 2.2;
        tail.minLifeTime = 1.2;
        tail.maxLifeTime = 2.6;
        tail.emitRate = 700;
        tail.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        // Blanco cerca del núcleo → cian al final → transparente.
        tail.color1 = new BABYLON.Color4(1, 1, 1, 1);
        tail.color2 = new BABYLON.Color4(0.8, 0.95, 1, 1);
        tail.colorDead = new BABYLON.Color4(0.4, 0.8, 1, 0);
        tail.minEmitPower = 1.5;
        tail.maxEmitPower = 3.0;
        tail.gravity = BABYLON.Vector3.Zero();
        tail.direction1 = new BABYLON.Vector3(1, 0, 0);
        tail.direction2 = new BABYLON.Vector3(1, 0, 0);
        tail.start();

        // Glow opcional sobre el núcleo.
        if (STATE._glow) {
            try { STATE._glow.addIncludedOnlyMesh(core); } catch (e) {}
        }

        return {
            core: core,
            tail: tail,
            semiMajor: semiMajor,
            ecc: ecc,
            period: period,
            phase: Math.random() * Math.PI * 2
        };
    }

    // --- 13. createNebulas() → planos billboard distantes --------------------

    /** 5 planos enormes con DynamicTexture radial, distribuidos en el espacio. */
    function createNebulas() {
        const tints = THEME_PRESETS[STATE.themeKey].nebulaTint;
        const nebulas = [];
        const positions = [
            new BABYLON.Vector3(-1300, 300, -1100),
            new BABYLON.Vector3(1200, -400, -1300),
            new BABYLON.Vector3(-900, 800, 1400),
            new BABYLON.Vector3(1400, 500, 1000),
            new BABYLON.Vector3(200, -900, -1500)
        ];
        for (let i = 0; i < positions.length; i++) {
            const c1 = tints[i % tints.length];
            const c2 = tints[(i + 1) % tints.length];
            const plane = BABYLON.MeshBuilder.CreatePlane("nebula_" + i, { width: 700, height: 700 }, scene);
            plane.position = positions[i];
            plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
            plane.isPickable = false;
            const mat = new BABYLON.StandardMaterial("nebulaMat_" + i, scene);
            mat.diffuseTexture = makeNebulaTexture(c1, c2);
            mat.diffuseTexture.hasAlpha = true;
            mat.useAlphaFromDiffuseTexture = true;
            mat.diffuseColor = BABYLON.Color3.Black();
            mat.emissiveTexture = mat.diffuseTexture;
            mat.emissiveColor = BABYLON.Color3.White();
            mat.specularColor = BABYLON.Color3.Black();
            mat.backFaceCulling = false;
            mat.alpha = 0.5;
            plane.material = mat;
            nebulas.push(plane);
        }
        return nebulas;
    }

    // --- 14. setupPostProcessing() → DefaultRenderingPipeline -----------------

    /** Pipeline con bloom + tone mapping. Se activa/desactiva vía UI. */
    function setupPostProcessing() {
        let pipeline = null;
        try {
            pipeline = new BABYLON.DefaultRenderingPipeline("default", true, scene, [camera]);
            pipeline.bloomEnabled = STATE.bloom;
            pipeline.bloomThreshold = 0.25;
            pipeline.bloomWeight = 0.7;
            pipeline.bloomKernel = 64;
            pipeline.bloomScale = 0.5;
            pipeline.imageProcessingEnabled = true;
            pipeline.imageProcessing.toneMappingEnabled = true;
            pipeline.imageProcessing.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
            pipeline.imageProcessing.vignetteEnabled = true;
            pipeline.imageProcessing.vignetteWeight = 1.2;
            pipeline.fxaaEnabled = true;
            pipeline.samples = 2;
        } catch (e) {
            pipeline = null;
        }
        return pipeline;
    }

    // =========================================================================
    // INSTANCIACIÓN DE LA ESCENA
    // =========================================================================

    const starsSystem = createStars();
    const sunBundle = createSun();
    const planetObjs = createPlanets(PLANETS);
    const orbitLines = createOrbits(PLANETS);
    const asteroids = createAsteroidBelt();
    const halley = createHalley();
    const nebulas = createNebulas();
    const pipeline = setupPostProcessing();

    // --- 15. setupUI() → listeners de todos los controles ---------------------

    /** Conecta cada control del panel a su efecto en STATE/escena. */
    function setupUI() {
        const $ = (id) => document.getElementById(id);

        // Velocidad global.
        $("globalSpeed").addEventListener("input", (e) => {
            STATE.globalSpeed = parseFloat(e.target.value);
            $("globalSpeedVal").textContent = STATE.globalSpeed.toFixed(1) + "x";
        });

        // Velocidad orbital (multiplicador independiente).
        $("orbitalSpeed").addEventListener("input", (e) => {
            STATE.orbitalSpeed = parseFloat(e.target.value);
            $("orbitalSpeedVal").textContent = STATE.orbitalSpeed.toFixed(1) + "x";
        });

        // Pausar/Reanudar.
        $("pauseBtn").addEventListener("click", (e) => {
            STATE.paused = !STATE.paused;
            e.target.textContent = STATE.paused ? "▶ Reanudar" : "⏸ Pausar";
            e.target.style.opacity = STATE.paused ? "0.7" : "1";
        });

        // Visibilidad: órbitas.
        $("showOrbits").addEventListener("change", (e) => {
            STATE.showOrbits = e.target.checked;
            orbitLines.forEach((l) => l.setEnabled(STATE.showOrbits));
        });

        // Visibilidad: nombres.
        $("showNames").addEventListener("change", (e) => {
            STATE.showNames = e.target.checked;
            planetObjs.forEach((p) => p.label.setEnabled(STATE.showNames));
        });

        // Visibilidad: Halley.
        $("showHalley").addEventListener("change", (e) => {
            STATE.showHalley = e.target.checked;
            halley.core.setEnabled(STATE.showHalley);
        });

        // Visibilidad: cola del cometa.
        $("showTail").addEventListener("change", (e) => {
            STATE.showTail = e.target.checked;
            if (STATE.showTail) { halley.tail.start(); } else { halley.tail.stop(); }
        });

        // Visibilidad: cinturón de asteroides.
        $("showBelt").addEventListener("change", (e) => {
            STATE.showBelt = e.target.checked;
            asteroids.forEach((a) => a.inst.setEnabled(STATE.showBelt));
        });

        // Visibilidad: nebulosas.
        $("showNebulas").addEventListener("change", (e) => {
            STATE.showNebulas = e.target.checked;
            nebulas.forEach((n) => n.setEnabled(STATE.showNebulas));
        });

        // Vista de cámara.
        $("cameraView").addEventListener("change", (e) => {
            STATE.cameraView = e.target.value;
            applyCameraView();
        });

        // Tamaño relativo de planetas.
        $("planetScale").addEventListener("input", (e) => {
            STATE.planetScale = parseFloat(e.target.value);
            $("planetScaleVal").textContent = STATE.planetScale.toFixed(1) + "x";
            planetObjs.forEach((p) => {
                const s = p.baseSize * STATE.planetScale;
                p.mesh.scaling.setAll(STATE.planetScale);
                if (p.atmosphere) p.atmosphere.scaling.setAll(STATE.planetScale);
                p.label.position.y = s + 2.5;
            });
        });

        // Tema.
        $("themeSelect").addEventListener("change", (e) => {
            STATE.themeKey = e.target.value;
            applyTheme();
        });

        // Bloom on/off.
        $("bloomToggle").addEventListener("change", (e) => {
            STATE.bloom = e.target.checked;
            if (pipeline) pipeline.bloomEnabled = STATE.bloom;
        });

        // Color del sol.
        $("sunColor").addEventListener("change", (e) => {
            STATE.sunColorKey = e.target.value;
            applySunColor();
        });

        // Botón de reaparecer panel (móvil).
        $("panelToggle").addEventListener("click", () => {
            $("panel").classList.remove("collapsed");
        });

        // Doble click en el panel lo colapsa en móvil.
        $("panel").addEventListener("dblclick", (e) => {
            if (window.innerWidth < 600 && e.target.id === "panel") {
                $("panel").classList.add("collapsed");
            }
        });
    }

    /** Aplica la vista de cámara seleccionada (objetivo + radio). */
    function applyCameraView() {
        const targets = {
            solar:     { target: BABYLON.Vector3.Zero(),                  radius: 180 },
            sun:       { target: BABYLON.Vector3.Zero(),                  radius: 45 },
            earth:     { target: planetObjs.find(p => p.data.name === "Tierra").mesh.position,  radius: 18 },
            saturn:    { target: planetObjs.find(p => p.data.name === "Saturno").mesh.position, radius: 28 },
            panoramic: { target: BABYLON.Vector3.Zero(),                  radius: 700 },
            halley:    { target: halley.core.position,                    radius: 30 }
        };
        const v = targets[STATE.cameraView];
        if (!v) return;
        camera.setTarget(v.target);
        camera.radius = v.radius;
    }

    /** Recolorea el sol (núcleo, luz y corona de respaldo) según el preset. */
    function applySunColor() {
        const preset = SUN_COLOR_PRESETS[STATE.sunColorKey];
        sunBundle.mat.emissiveColor = BABYLON.Color3.FromHexString(preset.core);
        sunLight.diffuse = BABYLON.Color3.FromHexString(preset.light);
        sunLight.specular = BABYLON.Color3.FromHexString(preset.light);
        STATE._sunPreset = preset;
    }

    /** Aplica el tema visual (color de fondo). */
    function applyTheme() {
        const t = THEME_PRESETS[STATE.themeKey];
        scene.clearColor = new BABYLON.Color4(t.bg[0], t.bg[1], t.bg[2], 1.0);
    }

    setupUI();

    // --- 16. RENDER LOOP (scene.onBeforeRenderObservable) --------------------

    let elapsed = 0;

    scene.onBeforeRenderObservable.add(() => {
        const dt = engine.getDeltaTime() / 1000; // segundos
        if (STATE.paused) {
            updateInfo();
            return;
        }
        const g = STATE.globalSpeed;
        elapsed += dt * g;

        // -- SOL: rotación + pulsado de escala --
        const sunScale = 1.0 + 0.05 * Math.sin(elapsed * 2.094); // ~cada 3s
        sunBundle.mesh.rotation.y += dt * 0.3 * g;
        sunBundle.mesh.scaling.setAll(sunScale);

        // -- PLANETAS: órbita elíptica + rotación propia --
        for (const p of planetObjs) {
            const d = p.data;
            p.orbitAngle += dt * d.orbitSpeed * STATE.orbitalSpeed * g * 0.25;
            const a = d.distance;
            const e = d.eccentricity;
            const b = a * Math.sqrt(1 - e * e);
            const x = a * Math.cos(p.orbitAngle) - a * e;
            const z = b * Math.sin(p.orbitAngle);
            p.pivot.position.set(x, 0, z);
            // El label sigue al planeta en Y; el billboard rota solo.
            p.label.position.set(x, d.size * STATE.planetScale + 2.5, z);
            // Rotación propia (retógrada si spinSpeed < 0).
            p.mesh.rotation.y += dt * d.spinSpeed * g;
        }

        // -- CINTURÓN DE ASTEROIDES: traslación lenta + rotación aleatoria --
        if (STATE.showBelt) {
            for (const ast of asteroids) {
                ast.angle += dt * ast.speed * STATE.orbitalSpeed * g;
                ast.inst.position.x = ast.radius * Math.cos(ast.angle);
                ast.inst.position.z = ast.radius * Math.sin(ast.angle);
                ast.inst.rotation.x += dt * ast.rotSpeed.x * g;
                ast.inst.rotation.y += dt * ast.rotSpeed.y * g;
            }
        }

        // -- COMETA HALLEY: órbita excéntrica + cola direccional --
        if (STATE.showHalley) {
            halley.phase += dt * (2 * Math.PI / halley.period) * g;
            const a = halley.semiMajor;
            const e = halley.ecc;
            const b = a * Math.sqrt(1 - e * e);
            const x = a * Math.cos(halley.phase) - a * e;
            const z = b * Math.sin(halley.phase);
            halley.core.position.set(x, 0, z);
            halley.core.rotation.y += dt * 1.2 * g;

            // La cola SIEMPRE apunta en dirección opuesta al sol.
            // Vector normalizado desde el sol hacia el cometa = dirección de la cola.
            const dir = halley.core.position.subtract(BABYLON.Vector3.Zero());
            if (dir.length() > 0.001) {
                dir.normalize();
                halley.tail.direction1 = dir.clone();
                halley.tail.direction2 = dir.clone();
                // El emisor empuja partículas a lo largo de 'direction'.
                halley.tail.minEmitPower = 2.0;
                halley.tail.maxEmitPower = 4.0;
            }

            // Si la vista de cámara sigue a Halley, actualizar target.
            if (STATE.cameraView === "halley") {
                camera.setTarget(halley.core.position);
            }
            if (STATE.cameraView === "saturn" || STATE.cameraView === "earth") {
                // Recolocar target del planeta correspondiente (se mueve).
                const key = STATE.cameraView === "earth" ? "Tierra" : "Saturno";
                const p = planetObjs.find(pp => pp.data.name === key);
                if (p) camera.setTarget(p.pivot.position);
            }
        }

        updateInfo();
    });

    /** Actualiza FPS y conteos del panel de información. */
    function updateInfo() {
        const fpsEl = document.getElementById("fpsCounter");
        const objEl = document.getElementById("objCounter");
        if (fpsEl) fpsEl.textContent = Math.round(engine.getFps());
        if (objEl) {
            // meshes visibles aproximado (planetas + asteroides + extras).
            const total = planetObjs.length * 2 + asteroids.length + 6;
            objEl.textContent = total;
        }
    }

    // --- 17. engine.runRenderLoop + resize ------------------------------------

    engine.runRenderLoop(() => {
        scene.render();
    });

    window.addEventListener("resize", () => engine.resize());

    // Ocultar el loader una vez renderiza el primer frame.
    scene.executeWhenReady(() => {
        const loader = document.getElementById("loader");
        if (loader) {
            loader.classList.add("hide");
            setTimeout(() => loader.remove(), 700);
        }
        applyCameraView();
    });
    </script>
</body>
