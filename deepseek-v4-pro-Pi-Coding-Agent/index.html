<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo 3D — Simulación Interactiva del Sistema Solar</title>

    <!-- Babylon.js vía CDN oficial -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>

    <style>
        /* ===== RESET CSS ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #000;
        }

        /* ===== CANVAS ===== */
        #renderCanvas {
            width: 100vw;
            height: 100vh;
            display: block;
            touch-action: none;
        }

        /* ===== PANEL DE CONFIGURACIÓN ===== */
        #panel {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 300px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 160, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            color: #c8d6f8;
            font-size: 13px;
            z-index: 100;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #panel h3 {
            font-size: 14px;
            font-weight: 600;
            color: #8ab4f8;
            margin: 16px 0 8px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(120, 160, 255, 0.2);
            letter-spacing: 0.5px;
        }

        #panel h3:first-child {
            margin-top: 0;
        }

        #panel label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 6px 0;
            cursor: pointer;
            font-size: 12px;
            color: #a0b4d8;
        }

        #panel label.checkbox-label {
            justify-content: flex-start;
            gap: 8px;
        }

        #panel input[type="range"] {
            width: 100%;
            margin: 4px 0 8px 0;
            accent-color: #5b8def;
            height: 4px;
        }

        #panel input[type="checkbox"] {
            accent-color: #5b8def;
            width: 14px;
            height: 14px;
        }

        #panel select {
            width: 100%;
            margin: 4px 0 8px 0;
            padding: 6px 8px;
            background: rgba(20, 30, 60, 0.9);
            color: #c8d6f8;
            border: 1px solid rgba(120, 160, 255, 0.3);
            border-radius: 6px;
            font-size: 12px;
            font-family: system-ui, sans-serif;
            cursor: pointer;
        }

        #panel select option {
            background: #0a0f1e;
            color: #c8d6f8;
        }

        #panel button {
            width: 100%;
            padding: 8px 12px;
            margin: 4px 0;
            background: rgba(91, 141, 239, 0.2);
            color: #8ab4f8;
            border: 1px solid rgba(120, 160, 255, 0.4);
            border-radius: 6px;
            font-size: 12px;
            font-family: system-ui, sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        #panel button:hover {
            background: rgba(91, 141, 239, 0.4);
        }

        #panel button.active {
            background: rgba(91, 141, 239, 0.5);
            border-color: rgba(120, 160, 255, 0.7);
        }

        .slider-value {
            font-size: 11px;
            color: #8ab4f8;
            min-width: 32px;
            text-align: right;
        }

        /* ===== SCROLLBAR PERSONALIZADO ===== */
        #panel::-webkit-scrollbar {
            width: 4px;
        }
        #panel::-webkit-scrollbar-track {
            background: transparent;
        }
        #panel::-webkit-scrollbar-thumb {
            background: rgba(120, 160, 255, 0.3);
            border-radius: 2px;
        }

        /* ===== PANEL DE INFORMACIÓN (INFERIOR IZQUIERDA) ===== */
        #info {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(120, 160, 255, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            color: #8ab4f8;
            font-size: 11px;
            font-family: system-ui, monospace;
            z-index: 100;
            line-height: 1.6;
        }

        #info .fps {
            font-size: 18px;
            font-weight: 700;
            color: #5b8def;
        }

        /* ===== TOGGLE DEL PANEL (MÓVIL) ===== */
        #panel-toggle {
            display: none;
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 101;
            width: 36px;
            height: 36px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(120, 160, 255, 0.3);
            border-radius: 8px;
            color: #8ab4f8;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            line-height: 34px;
        }

        /* ===== MEDIA QUERY: PANTALLAS PEQUEÑAS ===== */
        @media (max-width: 600px) {
            #panel {
                width: 260px;
                right: 8px;
                top: 8px;
                font-size: 11px;
                transform: translateX(120%);
                opacity: 0;
            }
            #panel.visible {
                transform: translateX(0);
                opacity: 1;
            }
            #panel-toggle {
                display: block;
            }
            #info {
                bottom: 8px;
                left: 8px;
                font-size: 10px;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <!-- Botón toggle para móvil -->
    <div id="panel-toggle" title="Configuración">⚙</div>

    <!-- Panel de configuración -->
    <div id="panel">
        <!-- SECCIÓN 1: TIEMPO Y VELOCIDAD -->
        <h3>⏱ Tiempo y Velocidad</h3>
        <label>Velocidad global <span class="slider-value" id="val-global-speed">1.0x</span></label>
        <input type="range" id="global-speed" min="0" max="10" step="0.1" value="1">

        <label>Velocidad orbital <span class="slider-value" id="val-orbital-speed">1.0x</span></label>
        <input type="range" id="orbital-speed" min="0.1" max="3" step="0.1" value="1">

        <button id="btn-pause">⏯ Pausar / Reanudar</button>

        <!-- SECCIÓN 2: VISUALIZACIÓN -->
        <h3>👁 Visualización</h3>
        <label class="checkbox-label">
            <input type="checkbox" id="show-orbits" checked> Mostrar órbitas
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="show-labels" checked> Mostrar nombres
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="show-halley" checked> Mostrar cometa Halley
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="show-halley-tail" checked> Mostrar cola del cometa
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="show-asteroids" checked> Mostrar cinturón de asteroides
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="show-nebulas" checked> Mostrar nebulosas
        </label>

        <label>Vista de cámara</label>
        <select id="camera-view">
            <option value="Sistema Solar">🌌 Sistema Solar</option>
            <option value="Sol cercano">☀️ Sol cercano</option>
            <option value="Tierra">🌍 Tierra</option>
            <option value="Saturno">🪐 Saturno</option>
            <option value="Panorámica">🔭 Panorámica</option>
            <option value="Halley">☄️ Halley</option>
        </select>

        <label>Tamaño relativo <span class="slider-value" id="val-planet-scale">1.0x</span></label>
        <input type="range" id="planet-scale" min="0.5" max="3" step="0.1" value="1">

        <!-- SECCIÓN 3: ESTÉTICA -->
        <h3>🎨 Estética</h3>
        <label>Tema visual</label>
        <select id="theme-select">
            <option value="futurista">🚀 Futurista</option>
            <option value="clasico">📜 Clásico</option>
            <option value="oscuro">🌑 Oscuro</option>
        </select>

        <label class="checkbox-label">
            <input type="checkbox" id="bloom-enabled" checked> Activar bloom/glow
        </label>

        <label>Color del sol</label>
        <select id="sun-color">
            <option value="amarillo">🟡 Amarillo</option>
            <option value="blanco">⚪ Blanco</option>
            <option value="naranja">🟠 Naranja</option>
            <option value="rojo">🔴 Rojo</option>
        </select>
    </div>

    <!-- Panel de información -->
    <div id="info">
        <span>FPS: <span class="fps" id="fps-display">--</span></span><br>
        <span>Objetos: <span id="obj-count">--</span></span><br>
        <span style="color:#a0b4d8;">🖱 Click izq: rotar | Rueda: zoom | Click der: pan</span>
    </div>

    <script>
    // ====================================================================
    //  UNIVERSO 3D — SIMULACIÓN COMPLETA DEL SISTEMA SOLAR CON BABYLON.JS
    //  Archivo autocontenido: HTML + CSS + JS + CDN
    // ====================================================================

    (async function () {
        // ================================================================
        //  1. CONSTANTES Y DATOS
        // ================================================================

        /** Constantes de la simulación */
        const ASTEROID_COUNT = 250;
        const STAR_COUNT = 3000;
        const NEBULA_COUNT = 5;
        const ORBIT_SEGMENTS = 128;

        /** Estado global modificable por la UI */
        const STATE = {
            globalSpeed: 1.0,
            orbitalMultiplier: 1.0,
            paused: false,
            showOrbits: true,
            showLabels: true,
            showHalley: true,
            showHalleyTail: true,
            showAsteroids: true,
            showNebulas: true,
            cameraView: 'Sistema Solar',
            planetScale: 1.0,
            bloomEnabled: true,
            sunColor: 'amarillo',
            theme: 'futurista',
        };

        /** Colores del sol por tema */
        const SUN_COLORS = {
            amarillo: { emissive: [1.0, 0.85, 0.1], diffuse: [1.0, 0.9, 0.2], light: [1.0, 0.95, 0.85] },
            blanco:  { emissive: [1.0, 1.0, 0.95], diffuse: [1.0, 1.0, 0.95], light: [1.0, 1.0, 0.95] },
            naranja: { emissive: [1.0, 0.5, 0.05], diffuse: [1.0, 0.55, 0.1], light: [1.0, 0.7, 0.4] },
            rojo:    { emissive: [1.0, 0.15, 0.05], diffuse: [0.9, 0.2, 0.05], light: [1.0, 0.4, 0.2] },
        };

        /** Datos de los planetas (distancias y tamaños escalados para visualización) */
        const PLANETS = [
            { name: 'Mercurio',  distance: 40,  size: 0.8,  color: [0.65, 0.65, 0.68], speed: 4.8,  tilt: 0.03,  eccentricity: 0.0 },
            { name: 'Venus',     distance: 60,  size: 1.5,  color: [0.85, 0.65, 0.25], speed: 3.0,  tilt: 2.64,  eccentricity: 0.0, retrograde: true },
            { name: 'Tierra',    distance: 80,  size: 1.6,  color: [0.15, 0.45, 0.75], speed: 2.4,  tilt: 0.41,  eccentricity: 0.0, atmosphere: [0.25, 0.55, 0.95] },
            { name: 'Marte',     distance: 100, size: 1.2,  color: [0.75, 0.25, 0.1],  speed: 1.9,  tilt: 0.44,  eccentricity: 0.0, atmosphere: [0.85, 0.35, 0.1] },
            { name: 'Júpiter',   distance: 180, size: 5.0,  color: [0.82, 0.72, 0.5],  speed: 1.0,  tilt: 0.05,  eccentricity: 0.0 },
            { name: 'Saturno',   distance: 240, size: 4.2,  color: [0.88, 0.82, 0.55], speed: 0.75, tilt: 0.47,  eccentricity: 0.0, rings: true },
            { name: 'Urano',     distance: 300, size: 3.0,  color: [0.45, 0.75, 0.65], speed: 0.5,  tilt: 1.71,  eccentricity: 0.0 },
            { name: 'Neptuno',   distance: 340, size: 2.8,  color: [0.18, 0.28, 0.85], speed: 0.42, tilt: 0.49,  eccentricity: 0.0 },
            { name: 'Plutón',    distance: 400, size: 0.5,  color: [0.55, 0.5, 0.45],  speed: 0.3,  tilt: 2.16,  eccentricity: 0.25 },
        ];

        // ================================================================
        //  2. ENGINE + SCENE
        // ================================================================

        const canvas = document.getElementById('renderCanvas');
        const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: false, stencil: true });
        const scene = new BABYLON.Scene(engine);

        // Fondo espacial profundo
        scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.03, 1.0);

        // ================================================================
        //  3. CÁMARA
        // ================================================================

        const camera = new BABYLON.ArcRotateCamera(
            'mainCamera',
            -Math.PI / 2,   // alpha (rotación horizontal)
            Math.PI / 3,    // beta (elevación)
            180,            // radio (distancia)
            BABYLON.Vector3.Zero(), // target (sol)
            scene
        );
        camera.attachControl(canvas, true);
        camera.lowerRadiusLimit = 30;
        camera.upperRadiusLimit = 2000;
        camera.wheelPrecision = 50;
        camera.panningSensibility = 500;
        camera.angularSensibilityX = 1000;
        camera.angularSensibilityY = 1000;

        // Auto-rotación lenta cuando no hay interacción
        camera.useAutoRotationBehavior = true;
        camera.autoRotationBehavior.idleRotationSpeed = 0.03;
        camera.autoRotationBehavior.idleRotationWaitTime = 2000;
        camera.autoRotationBehavior.idleRotationSpinupTime = 1500;
        camera.autoRotationBehavior.zoomStopsAnimation = true;

        // ================================================================
        //  4. LUCES
        // ================================================================

        // Luz hemisférica tenue para que el lado oscuro no sea negro absoluto
        const hemiLight = new BABYLON.HemisphericLight(
            'hemiLight',
            new BABYLON.Vector3(0, 1, 0),
            scene
        );
        hemiLight.intensity = 0.08;
        hemiLight.diffuse = new BABYLON.Color3(0.2, 0.2, 0.3);
        hemiLight.groundColor = new BABYLON.Color3(0.05, 0.05, 0.08);

        // PointLight en el origen (sol) — luz principal
        const sunLight = new BABYLON.PointLight(
            'sunLight',
            BABYLON.Vector3.Zero(),
            scene
        );
        sunLight.intensity = 2.0;
        sunLight.diffuse = new BABYLON.Color3(1.0, 0.95, 0.85);
        sunLight.range = 2000;

        // ================================================================
        //  5. FUNCIONES AUXILIARES
        // ================================================================

        /**
         * Crea una textura dinámica con el nombre de un planeta para usar como label.
         * @param {string} text - Nombre del planeta
         * @returns {BABYLON.DynamicTexture}
         */
        function makeLabelTexture(text) {
            const dt = new BABYLON.DynamicTexture('label_' + text, { width: 256, height: 64 }, scene);
            const ctx = dt.getContext();
            ctx.fillStyle = 'transparent';
            ctx.clearRect(0, 0, 256, 64);
            ctx.font = 'bold 28px system-ui, sans-serif';
            ctx.fillStyle = '#c8d6f8';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);
            dt.update();
            return dt;
        }

        /**
         * Crea una textura procedural de nebulosa con gradiente radial.
         * @param {number[]} color1 - Color central [r, g, b] (0-1)
         * @param {number[]} color2 - Color medio [r, g, b] (0-1)
         * @returns {BABYLON.DynamicTexture}
         */
        function makeNebulaTexture(color1, color2) {
            const size = 512;
            const dt = new BABYLON.DynamicTexture('nebulaTex', { width: size, height: size }, scene);
            const ctx = dt.getContext();
            const cx = size / 2, cy = size / 2;
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, size / 2);
            gradient.addColorStop(0, `rgba(${Math.round(color1[0]*255)},${Math.round(color1[1]*255)},${Math.round(color1[2]*255)},0.7)`);
            gradient.addColorStop(0.4, `rgba(${Math.round(color2[0]*255)},${Math.round(color2[1]*255)},${Math.round(color2[2]*255)},0.35)`);
            gradient.addColorStop(0.8, `rgba(${Math.round(color2[0]*128)},${Math.round(color2[1]*128)},${Math.round(color2[2]*128)},0.08)`);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            dt.update();
            return dt;
        }

        // ================================================================
        //  6. ESTRELLAS DE FONDO (SKYBOX PROCEDURAL)
        // ================================================================

        /**
         * Crea 3000+ estrellas estáticas distribuidas en una caja 2000x2000x2000.
         * @returns {BABYLON.ParticleSystem}
         */
        function createStars() {
            const starSystem = new BABYLON.ParticleSystem('stars', STAR_COUNT, scene);

            // Textura de partícula: creamos un puntito brillante procedural
            const flareTex = new BABYLON.DynamicTexture('flare', { width: 32, height: 32 }, scene);
            const fctx = flareTex.getContext();
            const fgrad = fctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            fgrad.addColorStop(0, 'rgba(255,255,255,1)');
            fgrad.addColorStop(0.15, 'rgba(255,255,255,0.9)');
            fgrad.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            fgrad.addColorStop(1, 'rgba(0,0,0,0)');
            fctx.fillStyle = fgrad;
            fctx.fillRect(0, 0, 32, 32);
            flareTex.update();
            starSystem.particleTexture = flareTex;

            // Emisión en caja enorme
            starSystem.minEmitBox = new BABYLON.Vector3(-1000, -1000, -1000);
            starSystem.maxEmitBox = new BABYLON.Vector3(1000, 1000, 1000);

            // Variación de colores: blanco, azul, amarillo
            starSystem.color1 = new BABYLON.Color4(0.7, 0.8, 1.0, 1.0);
            starSystem.color2 = new BABYLON.Color4(1.0, 0.95, 0.7, 1.0);
            starSystem.colorDead = new BABYLON.Color4(0, 0, 0, 0);

            // Tamaños variados
            starSystem.minSize = 0.3;
            starSystem.maxSize = 1.5;

            // Sin movimiento
            starSystem.minLifeTime = 99999;
            starSystem.maxLifeTime = 99999;
            starSystem.emitRate = STAR_COUNT;
            starSystem.minEmitPower = 0;
            starSystem.maxEmitPower = 0;
            starSystem.gravity = BABYLON.Vector3.Zero();
            starSystem.direction1 = BABYLON.Vector3.Zero();
            starSystem.direction2 = BABYLON.Vector3.Zero();
            starSystem.updateSpeed = 0.0001;
            starSystem.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
            starSystem.billboardMode = BABYLON.ParticleSystem.BILLBOARDMODE_Y;

            starSystem.start();

            // Detener emisión después de 1 segundo (ya se emitieron todas)
            setTimeout(() => { starSystem.emitRate = 0; }, 1200);

            return starSystem;
        }

        // ================================================================
        //  7. SOL CENTRAL
        // ================================================================

        /** @type {BABYLON.Mesh} */
        let sunMesh;
        /** @type {Object} — resultado de ParticleHelper.CreateAsync */
        let sunParticleSet;

        /**
         * Crea el sol: esfera emissive + corona con ParticleHelper.
         * @returns {Promise<void>}
         */
        async function createSun() {
            // Núcleo del sol
            sunMesh = BABYLON.MeshBuilder.CreateSphere('sun', { diameter: 8, segments: 64 }, scene);
            const sunMat = new BABYLON.StandardMaterial('sunMat', scene);
            const sc = SUN_COLORS[STATE.sunColor];
            sunMat.emissiveColor = new BABYLON.Color3(sc.emissive[0], sc.emissive[1], sc.emissive[2]);
            sunMat.diffuseColor = new BABYLON.Color3(sc.diffuse[0], sc.diffuse[1], sc.diffuse[2]);
            sunMat.specularColor = BABYLON.Color3.Black();
            sunMat.backFaceCulling = false;
            sunMesh.material = sunMat;

            // Corona solar usando ParticleHelper (API validada: CreateAsync)
            try {
                sunParticleSet = await BABYLON.ParticleHelper.CreateAsync('sun', scene);
                sunParticleSet.systems.forEach(sys => {
                    sys.emitter = BABYLON.Vector3.Zero();
                    sys.minSize = 0.5;
                    sys.maxSize = 2.0;
                });
                sunParticleSet.start();
            } catch (e) {
                console.warn('ParticleHelper "sun" no disponible, creando corona manual:', e.message);
                // Fallback: corona manual
                const coronaPS = new BABYLON.ParticleSystem('coronaFallback', 500, scene);
                coronaPS.particleTexture = new BABYLON.DynamicTexture('coronaTex', { width: 32, height: 32 }, scene);
                const cctx = coronaPS.particleTexture.getContext();
                const cg = cctx.createRadialGradient(16, 16, 0, 16, 16, 16);
                cg.addColorStop(0, 'rgba(255,200,50,1)');
                cg.addColorStop(0.3, 'rgba(255,150,20,0.6)');
                cg.addColorStop(1, 'rgba(0,0,0,0)');
                cctx.fillStyle = cg;
                cctx.fillRect(0, 0, 32, 32);
                coronaPS.particleTexture.update();
                coronaPS.emitter = BABYLON.Vector3.Zero();
                coronaPS.createSphereEmitter(4.5);
                coronaPS.minSize = 0.3;
                coronaPS.maxSize = 1.5;
                coronaPS.minLifeTime = 0.3;
                coronaPS.maxLifeTime = 0.8;
                coronaPS.emitRate = 200;
                coronaPS.color1 = new BABYLON.Color4(1, 0.7, 0.1, 0.8);
                coronaPS.color2 = new BABYLON.Color4(1, 0.4, 0.05, 0.3);
                coronaPS.colorDead = new BABYLON.Color4(0, 0, 0, 0);
                coronaPS.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
                coronaPS.start();
                sunParticleSet = { systems: [coronaPS], start: () => coronaPS.start(), stop: () => coronaPS.stop() };
            }
        }

        // ================================================================
        //  8. PLANETAS
        // ================================================================

        /** Almacena referencias a los meshes de planetas para el render loop */
        const planetObjects = [];

        /**
         * Crea todos los planetas del sistema solar.
         */
        function createPlanets() {
            PLANETS.forEach((pData, index) => {
                // Mesh del planeta
                const planetMesh = BABYLON.MeshBuilder.CreateSphere(
                    'planet_' + pData.name,
                    { diameter: pData.size * 2, segments: 48 },
                    scene
                );

                // Material del planeta
                const pMat = new BABYLON.StandardMaterial('mat_' + pData.name, scene);
                pMat.diffuseColor = new BABYLON.Color3(pData.color[0], pData.color[1], pData.color[2]);
                pMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
                pMat.backFaceCulling = true;
                planetMesh.material = pMat;

                // Posición inicial en la órbita (ángulo aleatorio para variedad)
                const startAngle = Math.random() * Math.PI * 2;
                planetMesh.position = new BABYLON.Vector3(
                    pData.distance * Math.cos(startAngle),
                    0,
                    pData.distance * Math.sin(startAngle)
                );

                // Atmósfera (si aplica)
                let atmosphereMesh = null;
                if (pData.atmosphere) {
                    atmosphereMesh = BABYLON.MeshBuilder.CreateSphere(
                        'atmo_' + pData.name,
                        { diameter: pData.size * 2 * 1.12, segments: 48 },
                        scene
                    );
                    const atmoMat = new BABYLON.StandardMaterial('atmoMat_' + pData.name, scene);
                    atmoMat.emissiveColor = new BABYLON.Color3(
                        pData.atmosphere[0], pData.atmosphere[1], pData.atmosphere[2]
                    );
                    atmoMat.alpha = 0.18;
                    atmoMat.diffuseColor = BABYLON.Color3.Black();
                    atmoMat.specularColor = BABYLON.Color3.Black();
                    atmoMat.backFaceCulling = false;
                    atmosphereMesh.material = atmoMat;
                    atmosphereMesh.parent = planetMesh;
                }

                // Label flotante (billboard)
                const labelTex = makeLabelTexture(pData.name);
                const labelMat = new BABYLON.StandardMaterial('labelMat_' + pData.name, scene);
                labelMat.diffuseTexture = labelTex;
                labelMat.emissiveColor = new BABYLON.Color3(0.8, 0.9, 1.0);
                labelMat.alpha = 0.9;
                labelMat.backFaceCulling = false;
                labelMat.disableLighting = true;

                const labelPlane = BABYLON.MeshBuilder.CreatePlane(
                    'label_' + pData.name,
                    { width: pData.size * 1.8, height: pData.size * 0.45 },
                    scene
                );
                labelPlane.material = labelMat;
                labelPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
                labelPlane.position.y = pData.size * 1.3;
                labelPlane.parent = planetMesh;

                // Anillos de Saturno
                let ringMesh = null;
                if (pData.rings) {
                    ringMesh = createSaturnRings(planetMesh, pData);
                }

                // Guardar referencia
                planetObjects.push({
                    data: pData,
                    mesh: planetMesh,
                    atmosphere: atmosphereMesh,
                    label: labelPlane,
                    ring: ringMesh,
                    angle: startAngle,
                });
            });
        }

        // ================================================================
        //  9. ÓRBITAS (LÍNEAS)
        // ================================================================

        /** @type {BABYLON.LineMesh[]} */
        const orbitLines = [];

        /**
         * Crea las líneas de órbita para cada planeta.
         */
        function createOrbits() {
            PLANETS.forEach((pData) => {
                const points = [];
                for (let i = 0; i <= ORBIT_SEGMENTS; i++) {
                    const angle = (i / ORBIT_SEGMENTS) * Math.PI * 2;
                    if (pData.eccentricity > 0) {
                        // Órbita elíptica
                        const r = pData.distance * (1 - pData.eccentricity * pData.eccentricity)
                            / (1 + pData.eccentricity * Math.cos(angle));
                        points.push(new BABYLON.Vector3(r * Math.cos(angle), 0, r * Math.sin(angle)));
                    } else {
                        // Órbita circular
                        points.push(new BABYLON.Vector3(
                            pData.distance * Math.cos(angle),
                            0,
                            pData.distance * Math.sin(angle)
                        ));
                    }
                }

                const orbitLine = BABYLON.MeshBuilder.CreateLines(
                    'orbit_' + pData.name,
                    { points: points, updatable: false },
                    scene
                );
                orbitLine.color = new BABYLON.Color3(0.25, 0.35, 0.55);
                orbitLine.alpha = 0.4;
                orbitLines.push(orbitLine);
            });
        }

        // ================================================================
        //  10. CINTURÓN DE ASTEROIDES
        // ================================================================

        /** @type {BABYLON.Mesh[]} */
        const asteroidMeshes = [];

        /**
         * Crea 250+ asteroides entre Marte y Júpiter.
         */
        function createAsteroidBelt() {
            for (let i = 0; i < ASTEROID_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 120 + Math.random() * 40;
                const yOffset = (Math.random() - 0.5) * 8;
                const size = 0.08 + Math.random() * 0.35;

                const asteroid = BABYLON.MeshBuilder.CreateSphere(
                    'asteroid_' + i,
                    { diameter: size, segments: 4 },
                    scene
                );
                asteroid.position = new BABYLON.Vector3(
                    radius * Math.cos(angle),
                    yOffset,
                    radius * Math.sin(angle)
                );

                // Color gris variado
                const gray = 0.3 + Math.random() * 0.4;
                const aMat = new BABYLON.StandardMaterial('astMat_' + i, scene);
                aMat.diffuseColor = new BABYLON.Color3(gray, gray * 0.9, gray * 0.85);
                aMat.specularColor = new BABYLON.Color3(0.02, 0.02, 0.02);
                asteroid.material = aMat;

                // Datos para animación
                asteroid._orbitRadius = radius;
                asteroid._orbitAngle = angle;
                asteroid._orbitSpeed = 0.05 + Math.random() * 0.15;
                asteroid._yOffset = yOffset;
                asteroid._rotSpeed = (Math.random() - 0.5) * 0.5;

                asteroidMeshes.push(asteroid);
            }
        }

        // ================================================================
        //  11. ANILLOS DE SATURNO
        // ================================================================

        /**
         * Crea los anillos de Saturno usando un torus.
         * @param {BABYLON.Mesh} planetMesh - Mesh del planeta padre
         * @param {Object} pData - Datos del planeta
         * @returns {BABYLON.Mesh}
         */
        function createSaturnRings(planetMesh, pData) {
            const ring = BABYLON.MeshBuilder.CreateTorus(
                'ring_' + pData.name,
                {
                    diameter: pData.size * 2.8,
                    thickness: 0.18,
                    tessellation: 96,
                },
                scene
            );
            ring.parent = planetMesh;
            ring.rotation.x = Math.PI / 2.2; // Ligeramente inclinado

            const ringMat = new BABYLON.StandardMaterial('ringMat_' + pData.name, scene);
            ringMat.diffuseColor = new BABYLON.Color3(0.75, 0.68, 0.5);
            ringMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.05);
            ringMat.alpha = 0.75;
            ringMat.backFaceCulling = false;
            ring.material = ringMat;

            // Segundo anillo más externo y fino
            const ring2 = BABYLON.MeshBuilder.CreateTorus(
                'ring2_' + pData.name,
                {
                    diameter: pData.size * 3.3,
                    thickness: 0.08,
                    tessellation: 96,
                },
                scene
            );
            ring2.parent = planetMesh;
            ring2.rotation.x = Math.PI / 2.15;
            const ring2Mat = new BABYLON.StandardMaterial('ring2Mat_' + pData.name, scene);
            ring2Mat.diffuseColor = new BABYLON.Color3(0.6, 0.55, 0.4);
            ring2Mat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.03);
            ring2Mat.alpha = 0.5;
            ring2Mat.backFaceCulling = false;
            ring2.material = ring2Mat;

            return ring; // Devolvemos el principal; ring2 se maneja por parent
        }

        // ================================================================
        //  12. COMETA HALLEY
        // ================================================================

        /** @type {BABYLON.Mesh} */
        let halleyMesh;
        /** @type {BABYLON.ParticleSystem} */
        let halleyTail;
        /** @type {number} */
        let halleyAngle = 0;
        const HALLEY_SEMI_MAJOR = 200;
        const HALLEY_ECCENTRICITY = 0.85;
        const HALLEY_PERIOD = 18; // segundos para una órbita completa

        /**
         * Crea el cometa Halley con núcleo y cola de partículas.
         */
        function createHalley() {
            // Núcleo del cometa
            halleyMesh = BABYLON.MeshBuilder.CreateSphere('halley', { diameter: 0.6, segments: 32 }, scene);
            const halleyMat = new BABYLON.StandardMaterial('halleyMat', scene);
            halleyMat.emissiveColor = new BABYLON.Color3(0.6, 0.7, 1.0);
            halleyMat.diffuseColor = new BABYLON.Color3(0.5, 0.6, 0.9);
            halleyMat.specularColor = BABYLON.Color3.Black();
            halleyMesh.material = halleyMat;

            // Posición inicial
            halleyAngle = Math.PI * 0.3;
            updateHalleyPosition(halleyAngle);

            // Cola del cometa (ParticleSystem)
            halleyTail = new BABYLON.ParticleSystem('halleyTail', 1500, scene);

            // Textura para la cola
            const tailTex = new BABYLON.DynamicTexture('tailTex', { width: 32, height: 32 }, scene);
            const tctx = tailTex.getContext();
            const tg = tctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            tg.addColorStop(0, 'rgba(255,255,255,1)');
            tg.addColorStop(0.2, 'rgba(180,210,255,0.8)');
            tg.addColorStop(0.6, 'rgba(80,150,255,0.3)');
            tg.addColorStop(1, 'rgba(0,0,0,0)');
            tctx.fillStyle = tg;
            tctx.fillRect(0, 0, 32, 32);
            tailTex.update();
            halleyTail.particleTexture = tailTex;

            halleyTail.emitter = halleyMesh;
            halleyTail.minSize = 0.15;
            halleyTail.maxSize = 0.8;
            halleyTail.minLifeTime = 0.8;
            halleyTail.maxLifeTime = 2.5;
            halleyTail.emitRate = 600;
            halleyTail.minEmitPower = 2;
            halleyTail.maxEmitPower = 8;
            halleyTail.updateSpeed = 0.01;
            halleyTail.color1 = new BABYLON.Color4(1, 1, 1, 0.9);
            halleyTail.color2 = new BABYLON.Color4(0.4, 0.6, 1, 0.5);
            halleyTail.colorDead = new BABYLON.Color4(0.1, 0.2, 0.5, 0);
            halleyTail.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
            halleyTail.billboardMode = BABYLON.ParticleSystem.BILLBOARDMODE_STRETCHED;
            halleyTail.start();
        }

        /**
         * Actualiza la posición del cometa en su órbita elíptica.
         * @param {number} angle - Ángulo orbital actual
         */
        function updateHalleyPosition(angle) {
            const e = HALLEY_ECCENTRICITY;
            const a = HALLEY_SEMI_MAJOR;
            const r = a * (1 - e * e) / (1 + e * Math.cos(angle));
            halleyMesh.position.x = r * Math.cos(angle);
            halleyMesh.position.z = r * Math.sin(angle);
            halleyMesh.position.y = Math.sin(angle) * 15; // Variación vertical
        }

        // ================================================================
        //  13. NEBULOSAS
        // ================================================================

        /** @type {BABYLON.Mesh[]} */
        const nebulaPlanes = [];

        /**
         * Crea 5 planos de nebulosa con texturas procedurales.
         */
        function createNebulas() {
            const nebulaConfigs = [
                { pos: [600, 200, 400],   rot: [0.3, 0.5, 0.1], colors: [[0.7, 0.2, 0.5], [0.3, 0.1, 0.6]] },
                { pos: [-500, -150, 600], rot: [0.8, 0.2, 0.4], colors: [[0.2, 0.4, 0.8], [0.1, 0.2, 0.5]] },
                { pos: [300, -300, -700], rot: [0.5, 0.7, 0.2], colors: [[0.6, 0.3, 0.7], [0.2, 0.1, 0.4]] },
                { pos: [-700, 100, -300], rot: [0.2, 0.9, 0.3], colors: [[0.3, 0.6, 0.7], [0.1, 0.3, 0.5]] },
                { pos: [100, 400, -600],  rot: [0.6, 0.3, 0.5], colors: [[0.5, 0.2, 0.6], [0.3, 0.1, 0.3]] },
            ];

            nebulaConfigs.forEach((cfg, i) => {
                const tex = makeNebulaTexture(cfg.colors[0], cfg.colors[1]);
                const mat = new BABYLON.StandardMaterial('nebMat_' + i, scene);
                mat.diffuseTexture = tex;
                mat.emissiveColor = new BABYLON.Color3(
                    cfg.colors[0][0] * 0.5, cfg.colors[0][1] * 0.5, cfg.colors[0][2] * 0.5
                );
                mat.alpha = 0.6;
                mat.backFaceCulling = false;
                mat.disableLighting = true;

                const plane = BABYLON.MeshBuilder.CreatePlane(
                    'nebula_' + i,
                    { width: 500, height: 500 },
                    scene
                );
                plane.material = mat;
                plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
                plane.position = new BABYLON.Vector3(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
                plane.rotation = new BABYLON.Vector3(cfg.rot[0], cfg.rot[1], cfg.rot[2]);

                nebulaPlanes.push(plane);
            });
        }

        // ================================================================
        //  14. POST-PROCESADO (BLOOM + GLOW)
        // ================================================================

        /** @type {BABYLON.DefaultRenderingPipeline} */
        let pipeline;

        /**
         * Configura el pipeline de post-procesado con bloom y glow.
         */
        function setupPostProcessing() {
            pipeline = new BABYLON.DefaultRenderingPipeline(
                'defaultPipeline',
                true,  // HDR
                scene,
                [camera]
            );

            if (pipeline.isSupported) {
                // Bloom
                pipeline.bloomEnabled = STATE.bloomEnabled;
                pipeline.bloomThreshold = 0.6;
                pipeline.bloomScale = 0.4;
                pipeline.bloomWeight = 0.3;
                pipeline.bloomKernel = 64;

                // Glow Layer
                pipeline.glowLayerEnabled = true;
                if (pipeline.glowLayerEnabled) {
                    pipeline.glowLayer.intensity = 0.5;
                    pipeline.glowLayer.blurKernelSize = 16;
                }

                // Image Processing
                pipeline.imageProcessingEnabled = true;
                pipeline.imageProcessing.toneMappingEnabled = true;
                pipeline.imageProcessing.contrast = 1.1;
                pipeline.imageProcessing.exposure = 1.0;

                // FXAA para suavizado
                pipeline.fxaaEnabled = true;
            }
        }

        // ================================================================
        //  15. CONSTRUCCIÓN DE LA ESCENA
        // ================================================================

        const stars = createStars();
        await createSun();
        createPlanets();
        createOrbits();
        createAsteroidBelt();
        createHalley();
        createNebulas();
        setupPostProcessing();

        // Contador de objetos
        const totalObjects = 1 + PLANETS.length + ASTEROID_COUNT + 1 + NEBULA_COUNT + PLANETS.length;
        document.getElementById('obj-count').textContent = totalObjects;

        // ================================================================
        //  16. UI — CONFIGURACIÓN DE CONTROLES
        // ================================================================

        function setupUI() {
            // --- Velocidad global ---
            const globalSpeedSlider = document.getElementById('global-speed');
            const globalSpeedVal = document.getElementById('val-global-speed');
            globalSpeedSlider.addEventListener('input', () => {
                STATE.globalSpeed = parseFloat(globalSpeedSlider.value);
                globalSpeedVal.textContent = STATE.globalSpeed.toFixed(1) + 'x';
            });

            // --- Velocidad orbital ---
            const orbitalSpeedSlider = document.getElementById('orbital-speed');
            const orbitalSpeedVal = document.getElementById('val-orbital-speed');
            orbitalSpeedSlider.addEventListener('input', () => {
                STATE.orbitalMultiplier = parseFloat(orbitalSpeedSlider.value);
                orbitalSpeedVal.textContent = STATE.orbitalMultiplier.toFixed(1) + 'x';
            });

            // --- Pausar / Reanudar ---
            const pauseBtn = document.getElementById('btn-pause');
            pauseBtn.addEventListener('click', () => {
                STATE.paused = !STATE.paused;
                pauseBtn.textContent = STATE.paused ? '▶ Reanudar' : '⏯ Pausar / Reanudar';
                pauseBtn.classList.toggle('active', STATE.paused);
            });

            // --- Mostrar órbitas ---
            document.getElementById('show-orbits').addEventListener('change', (e) => {
                STATE.showOrbits = e.target.checked;
                orbitLines.forEach(line => line.isVisible = STATE.showOrbits);
            });

            // --- Mostrar nombres ---
            document.getElementById('show-labels').addEventListener('change', (e) => {
                STATE.showLabels = e.target.checked;
                planetObjects.forEach(po => {
                    if (po.label) po.label.isVisible = STATE.showLabels;
                });
            });

            // --- Mostrar Halley ---
            document.getElementById('show-halley').addEventListener('change', (e) => {
                STATE.showHalley = e.target.checked;
                if (halleyMesh) halleyMesh.isVisible = STATE.showHalley;
                if (halleyTail && !STATE.showHalley) halleyTail.stop();
                if (halleyTail && STATE.showHalley) halleyTail.start();
            });

            // --- Mostrar cola del cometa ---
            document.getElementById('show-halley-tail').addEventListener('change', (e) => {
                STATE.showHalleyTail = e.target.checked;
                if (halleyTail) {
                    if (STATE.showHalleyTail && STATE.showHalley) {
                        halleyTail.start();
                    } else {
                        halleyTail.stop();
                    }
                }
            });

            // --- Mostrar asteroides ---
            document.getElementById('show-asteroids').addEventListener('change', (e) => {
                STATE.showAsteroids = e.target.checked;
                asteroidMeshes.forEach(a => a.isVisible = STATE.showAsteroids);
            });

            // --- Mostrar nebulosas ---
            document.getElementById('show-nebulas').addEventListener('change', (e) => {
                STATE.showNebulas = e.target.checked;
                nebulaPlanes.forEach(n => n.isVisible = STATE.showNebulas);
            });

            // --- Vista de cámara ---
            const cameraViewSelect = document.getElementById('camera-view');
            cameraViewSelect.addEventListener('change', (e) => {
                STATE.cameraView = e.target.value;
            });

            // --- Tamaño relativo ---
            const planetScaleSlider = document.getElementById('planet-scale');
            const planetScaleVal = document.getElementById('val-planet-scale');
            planetScaleSlider.addEventListener('input', () => {
                STATE.planetScale = parseFloat(planetScaleSlider.value);
                planetScaleVal.textContent = STATE.planetScale.toFixed(1) + 'x';
                planetObjects.forEach(po => {
                    const baseSize = po.data.size * 2;
                    po.mesh.scaling = new BABYLON.Vector3(STATE.planetScale, STATE.planetScale, STATE.planetScale);
                });
            });

            // --- Tema visual ---
            document.getElementById('theme-select').addEventListener('change', (e) => {
                STATE.theme = e.target.value;
                applyTheme(STATE.theme);
            });

            // --- Bloom ---
            document.getElementById('bloom-enabled').addEventListener('change', (e) => {
                STATE.bloomEnabled = e.target.checked;
                if (pipeline && pipeline.isSupported) {
                    pipeline.bloomEnabled = STATE.bloomEnabled;
                    pipeline.glowLayerEnabled = STATE.bloomEnabled;
                }
            });

            // --- Color del sol ---
            document.getElementById('sun-color').addEventListener('change', (e) => {
                STATE.sunColor = e.target.value;
                const sc = SUN_COLORS[STATE.sunColor];
                if (sunMesh && sunMesh.material) {
                    sunMesh.material.emissiveColor = new BABYLON.Color3(sc.emissive[0], sc.emissive[1], sc.emissive[2]);
                    sunMesh.material.diffuseColor = new BABYLON.Color3(sc.diffuse[0], sc.diffuse[1], sc.diffuse[2]);
                }
                sunLight.diffuse = new BABYLON.Color3(sc.light[0], sc.light[1], sc.light[2]);
            });

            // --- Toggle panel en móvil ---
            const panelToggle = document.getElementById('panel-toggle');
            const panel = document.getElementById('panel');
            panelToggle.addEventListener('click', () => {
                panel.classList.toggle('visible');
            });
        }

        /**
         * Aplica un tema visual al fondo y UI.
         * @param {string} theme - 'futurista', 'clasico', 'oscuro'
         */
        function applyTheme(theme) {
            switch (theme) {
                case 'futurista':
                    scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.03, 1.0);
                    orbitLines.forEach(l => l.color = new BABYLON.Color3(0.25, 0.35, 0.55));
                    break;
                case 'clasico':
                    scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.06, 1.0);
                    orbitLines.forEach(l => l.color = new BABYLON.Color3(0.4, 0.4, 0.5));
                    break;
                case 'oscuro':
                    scene.clearColor = new BABYLON.Color4(0.0, 0.0, 0.0, 1.0);
                    orbitLines.forEach(l => l.color = new BABYLON.Color3(0.15, 0.15, 0.2));
                    break;
            }
        }

        setupUI();

        // ================================================================
        //  17. BUCLE DE RENDER (ANIMACIONES)
        // ================================================================

        /** Variables para FPS */
        let fpsFrameCount = 0;
        let fpsLastTime = performance.now();
        let currentFPS = 0;

        /**
         * Observador que se ejecuta antes de cada frame.
         * Todas las animaciones usan deltaTime para ser frame-rate independent.
         */
        scene.onBeforeRenderObservable.add(() => {
            const deltaTime = engine.getDeltaTime() / 1000; // segundos
            const dt = STATE.paused ? 0 : deltaTime * STATE.globalSpeed;

            // --- FPS ---
            fpsFrameCount++;
            const now = performance.now();
            if (now - fpsLastTime >= 1000) {
                currentFPS = fpsFrameCount;
                fpsFrameCount = 0;
                fpsLastTime = now;
                document.getElementById('fps-display').textContent = currentFPS;
            }

            // --- Sol: rotación + pulsado ---
            if (sunMesh) {
                sunMesh.rotation.y += dt * 0.3;
                const pulse = 1 + Math.sin(performance.now() * 0.001 * Math.PI * 2 / 3) * 0.025;
                sunMesh.scaling = new BABYLON.Vector3(pulse, pulse, pulse);
            }

            // --- Planetas: órbita + rotación propia ---
            planetObjects.forEach(po => {
                const pData = po.data;
                const orbitalSpeed = pData.speed * STATE.orbitalMultiplier;
                const direction = pData.retrograde ? -1 : 1;
                po.angle += dt * orbitalSpeed * direction * 0.5;

                // Calcular posición orbital
                let r, x, z;
                if (pData.eccentricity > 0) {
                    r = pData.distance * (1 - pData.eccentricity * pData.eccentricity)
                        / (1 + pData.eccentricity * Math.cos(po.angle));
                } else {
                    r = pData.distance;
                }
                x = r * Math.cos(po.angle);
                z = r * Math.sin(po.angle);

                po.mesh.position.x = x;
                po.mesh.position.z = z;
                po.mesh.position.y = 0;

                // Rotación propia sobre eje inclinado
                po.mesh.rotation.y += dt * 1.5 * STATE.orbitalMultiplier;
                if (pData.tilt > 0.01) {
                    po.mesh.rotation.x = pData.tilt;
                }
            });

            // --- Asteroides: movimiento lento ---
            asteroidMeshes.forEach(a => {
                if (!a.isVisible) return;
                a._orbitAngle += dt * a._orbitSpeed * 0.3;
                a.position.x = a._orbitRadius * Math.cos(a._orbitAngle);
                a.position.z = a._orbitRadius * Math.sin(a._orbitAngle);
                a.position.y = a._yOffset + Math.sin(a._orbitAngle * 3) * 1.5;
                a.rotation.y += dt * a._rotSpeed;
                a.rotation.x += dt * a._rotSpeed * 0.5;
            });

            // --- Cometa Halley ---
            if (halleyMesh && STATE.showHalley) {
                halleyAngle += dt * (2 * Math.PI / HALLEY_PERIOD);
                if (halleyAngle > Math.PI * 2) halleyAngle -= Math.PI * 2;
                updateHalleyPosition(halleyAngle);

                // Cola: siempre en dirección opuesta al sol
                if (halleyTail && STATE.showHalleyTail) {
                    const sunToComet = halleyMesh.position.subtract(BABYLON.Vector3.Zero()).normalize();
                    const tailDir = sunToComet.scale(-1);
                    halleyTail.direction1 = tailDir;
                    halleyTail.direction2 = tailDir.scale(0.8);
                }
            }

            // --- Cámara: presets ---
            if (STATE.cameraView === 'Tierra') {
                const earth = planetObjects.find(po => po.data.name === 'Tierra');
                if (earth) camera.target = earth.mesh.position.clone();
            } else if (STATE.cameraView === 'Saturno') {
                const saturn = planetObjects.find(po => po.data.name === 'Saturno');
                if (saturn) camera.target = saturn.mesh.position.clone();
            } else if (STATE.cameraView === 'Halley') {
                if (halleyMesh && STATE.showHalley) camera.target = halleyMesh.position.clone();
            } else {
                camera.target = BABYLON.Vector3.Zero();
            }
        });

        // ================================================================
        //  18. INICIO DEL RENDER LOOP
        // ================================================================

        engine.runRenderLoop(() => {
            scene.render();
        });

        // Redimensionar al cambiar tamaño de ventana
        window.addEventListener('resize', () => {
            engine.resize();
        });

        // ================================================================
        //  FIN — Universo 3D listo
        // ================================================================
        console.log('🌌 Universo 3D inicializado — ' + totalObjects + ' objetos en escena.');
        console.log('🖱 Controles: Click izq = rotar | Rueda = zoom | Click der = pan');
    })();
    </script>
</body>
</html>
